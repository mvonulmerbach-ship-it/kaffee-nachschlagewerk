<!DOCTYPE html>

<head>

<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<style>
:root{--bg:#f7f6f2;--panel:#fff;--ink:#1c1b18;--muted:#6b6862;--line:#e7e4dc;
  --brand:#3b6e58;--brandink:#fff;--soft:#f0eee9;--hover:#f3f0fa;
  --shadow:0 8px 24px rgba(40,30,20,.07);
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
[data-theme="dark"]{--bg:#15131a;--panel:#1d1a24;--ink:#ece8f1;--muted:#a49db4;--line:#322c3c;
  --soft:#241f2e;--hover:#262031;--brandink:#fff;--shadow:0 8px 24px rgba(0,0,0,.4)}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.6;-webkit-text-size-adjust:100%}
a{color:var(--brand)}
header{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.hd{max-width:1100px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:12px}
.logo{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;font-size:19px;background:var(--brand);color:#fff;flex:0 0 auto;border:none;cursor:pointer;padding:0}
.ttl b{font-size:16px;font-weight:800;display:block;line-height:1.1}
.ttl span{font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted)}
.hd .sp{flex:1}
.search{width:min(340px,42vw);font:inherit;font-size:14px;color:var(--ink);background:var(--panel);border:1.5px solid var(--line);border-radius:10px;padding:9px 13px}
.search:focus{outline:none;border-color:var(--brand)}
.iconbtn{background:var(--panel);border:1.5px solid var(--line);color:var(--ink);border-radius:10px;width:38px;height:38px;font-size:16px;cursor:pointer;flex:0 0 auto}
.menubtn{display:none}
.shell{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:280px 1fr;gap:0}
aside{border-right:1px solid var(--line);padding:18px 10px 60px;height:calc(100vh - 58px);overflow:auto;position:sticky;top:58px}
.cat{margin-bottom:4px}
.cat>.catname{display:flex;align-items:center;gap:7px;width:100%;text-align:left;font:inherit;font-weight:700;font-size:14px;color:var(--ink);
  background:none;border:none;cursor:pointer;padding:8px 10px;border-radius:8px}
.cat>.catname:hover{background:var(--soft)}
.cat>.catname .tw{margin-left:auto;color:var(--muted);font-size:11px;transition:.15s}
.cat.collapsed .children{display:none}
.cat.collapsed .tw{transform:rotate(-90deg)}
.children{padding-left:6px}
.subname{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);padding:8px 10px 3px}
.alink{display:block;font:inherit;text-align:left;width:100%;background:none;border:none;color:var(--ink);cursor:pointer;
  padding:6px 10px 6px 22px;border-radius:7px;font-size:13.5px;line-height:1.35}
.alink:hover{background:var(--soft)}
.alink.active{background:var(--brand);color:var(--brandink);font-weight:600}
main{padding:26px 30px 80px;min-width:0;max-width:780px}
.crumb{font-size:12.5px;color:var(--muted);margin-bottom:6px}
.art h1{font-size:30px;margin:0 0 14px;line-height:1.15;font-weight:800}
.art h2{font-size:21px;margin:26px 0 8px}
.art h3{font-size:17px;margin:20px 0 6px}
.art p{margin:0 0 13px}
.art ul{margin:0 0 13px;padding-left:20px}.art li{margin-bottom:5px}
.art a.ilink{color:var(--brand);text-decoration:none;border-bottom:1px solid color-mix(in srgb,var(--brand) 35%,transparent);cursor:pointer}
.art a.ilink:hover{border-bottom-color:var(--brand)}
.lead{font-size:16.5px;color:var(--ink)}
.box{background:var(--soft);border:1px solid var(--line);border-left:4px solid var(--brand);border-radius:12px;padding:12px 16px;margin:14px 0;font-size:14.5px}
.seealso{margin-top:26px;border-top:1px solid var(--line);padding-top:14px}
.seealso b{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.seealso .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.seealso .chips a{font-size:13px;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:5px 12px;text-decoration:none;color:var(--brand)}
.aromaframe{width:100%;height:72vh;border:1px solid var(--line);border-radius:12px;background:var(--panel)}
.results .alink{padding-left:10px}
.sidebackdrop{display:none}
@media(max-width:820px){
 .hd{padding-top:calc(env(safe-area-inset-top) + 22px);padding-bottom:12px}
 .iconbtn,.menubtn{width:44px;height:44px;font-size:18px}
 .shell{grid-template-columns:1fr}
 aside{position:fixed;top:0;left:0;bottom:0;width:280px;height:100vh;z-index:40;background:var(--panel);transform:translateX(-105%);transition:.25s;padding-top:16px}
 aside.open{transform:none}
 .sidebackdrop.open{display:block;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:35}
 .menubtn{display:grid;place-items:center}
 main{padding:20px 16px 70px}
 .search{width:auto;flex:1}
 .ttl{display:none}
}
</style>
</head>

  <div class="hd">
    <button class="iconbtn menubtn" id="menubtn" aria-label="Menü">☰</button>
    <button class="logo" id="logo" title="Startseite" aria-label="Startseite"></button>
    <div class="ttl"><b id="brand"></b><span>Nachschlagewerk</span></div>
    <span class="sp"></span>
    <input class="search" id="search" placeholder="Artikel suchen …">
    <button class="iconbtn" id="themebtn" aria-label="Dark Mode">🌙</button>
  </div>
</header>
<div class="sidebackdrop" id="backdrop"></div>
<div class="shell">
  <aside id="side"></aside>
  <main id="main"></main>
</div>
<script>
const APP={"title": "Kaffee", "brand": "Bari<b>sta</b>", "color": "#6f4e37", "ic": "☕", "articles": [{"slug": "espresso-grundlagen", "title": "Espresso-Grundlagen", "crumb": "Espresso", "body": "<p><b>Espresso</b> ist eine konzentrierte <a class=\"ilink\" data-s=\"extraktion-kennzahlen\">Extraktion</a>: Heißes <a class=\"ilink\" data-s=\"wasser\">Wasser</a> wird mit hohem Druck durch fein gemahlenes, verdichtetes Kaffeemehl gepresst. Klassische Eckwerte sind eine <b>Ratio</b> von ca. <b>1:2</b> (z. B. 18 g Mehl ergeben ~36 g Getränk), ein Brühdruck von etwa <b>9 bar</b>, eine Wassertemperatur um <b>90–94 °C</b> und eine Extraktionszeit von rund <b>25–30 Sekunden</b>.</p>\n<p>Die <b><a class=\"ilink\" data-s=\"crema\">Crema</a></b> – die haselnussbraune Schaumschicht – entsteht aus emulgierten Ölen und CO2 frisch gerösteten Kaffees. Ein <b>Ristretto</b> wird kürzer/mit weniger Wasser gezogen (intensiver), ein <b>Lungo</b> länger. Sauberes <b>Tampern</b> (gleichmäßiges Verdichten) verhindert, dass Wasser ungleichmäßig durchläuft (<b><a class=\"ilink\" data-s=\"troubleshooting\">Channeling</a></b>).</p><p>Eng verwandt ist der Artikel <a class=\"ilink\" data-s=\"standards-geschichte\">Standards & Geschichte</a>.</p><p>Eng verwandt ist der Artikel <a class=\"ilink\" data-s=\"quellen\">Quellen & Weiterlesen</a>.</p>", "rel": []}, {"slug": "crema", "title": "Crema", "crumb": "Espresso", "body": "<p class=\"lead\">Die Crema ist die haselnussbraune Schaumschicht auf einem <a class=\"ilink\" data-s=\"espresso-grundlagen\">Espresso</a>.</p>\n<p>Sie besteht aus emulgierten Ölen und im Kaffee gelöstem CO₂, das beim Druck freigesetzt wird – ein Zeichen für frisch gerösteten Kaffee. Eine schöne Crema ist ein Indiz, aber <b>kein Garant</b> für guten Geschmack; entscheidend bleibt die <a class=\"ilink\" data-s=\"extraktion-kennzahlen\">Extraktion</a>.</p><p>Eng verwandt ist der Artikel <a class=\"ilink\" data-s=\"milch-latte\">Milch & Latte Art</a>.</p>", "rel": []}, {"slug": "milch-latte", "title": "Milch & Latte Art", "crumb": "Zubereitung", "body": "<p>Beim Aufschäumen wird Milch mit Dampf zu <b>Mikroschaum</b> – feinporig und glänzend. Entscheidend sind die <b>Ziehphase</b> (Luft einziehen) und die <b>Rollphase</b> (Wirbel, der den Schaum homogenisiert). Ideale Trinktemperatur liegt bei etwa <b>60–65 °C</b>; darüber wird die Milch „verbrannt\" und schmeckt nicht mehr süß.</p>\n<p>Getränke unterscheiden sich vor allem im Milch-Schaum-Verhältnis: <b>Cappuccino</b> etwa zu gleichen Teilen <a class=\"ilink\" data-s=\"espresso-grundlagen\">Espresso</a>, Milch und Schaum; <b>Flat White</b> mit feinem Mikroschaum und mehr Espresso-Intensität; <b>Latte Macchiato</b> viel Milch, wenig Schaum, Espresso obenauf. <b>Latte Art</b> gelingt nur mit gut gerolltem Mikroschaum.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"mahlen-dosieren\">Mahlen & Dosieren</a> und <a class=\"ilink\" data-s=\"bruehmethoden\">Brühmethoden</a>.</p><p>Eng verwandt ist der Artikel <a class=\"ilink\" data-s=\"maschine-wartung\">Maschine & Wartung</a>.</p>", "rel": []}, {"slug": "mahlen-dosieren", "title": "Mahlen & Dosieren", "crumb": "Zubereitung", "body": "<p>Der <b>Mahlgrad</b> ist die wichtigste Stellschraube am <a class=\"ilink\" data-s=\"espresso-grundlagen\">Espresso</a>: zu fein → langsam, bitter (Überextraktion); zu grob → schnell, sauer (Unterextraktion). Man stellt ihn so ein, dass Dosis, Zeit und <a class=\"ilink\" data-s=\"extraktion-kennzahlen\">Ausbeute</a> zusammenpassen. <b>Frisch mahlen</b> ist Pflicht, da Aromen schnell entweichen.</p>\n<p>Eine typische Doppel-Dosis (Doppio) liegt bei <b>18–20 g</b>. Für gleichmäßige Verteilung sorgen Techniken wie <b>WDT</b> (Auflockern mit Nadeln) und sauberes <b>Distribuieren</b> vor dem Tampern. <b>Scheibenmühlen</b> (flat/conical) mahlen gleichmäßiger als Schlagmahlwerke.</p><p>Eng verwandt ist der Artikel <a class=\"ilink\" data-s=\"milch-latte\">Milch & Latte Art</a>.</p>", "rel": []}, {"slug": "bruehmethoden", "title": "Brühmethoden", "crumb": "Zubereitung", "body": "<p>Neben <a class=\"ilink\" data-s=\"espresso-grundlagen\">Espresso</a> gibt es zahlreiche <b>Filtermethoden</b>: <b>Pour Over</b> (V60, Chemex), <b>French Press</b> (Vollimmersion), <b>AeroPress</b> und <b>Filterkaffeemaschine</b>. Sie arbeiten ohne hohen Druck, mit gröberem <a class=\"ilink\" data-s=\"mahlen-dosieren\">Mahlgrad</a> und längerer Kontaktzeit – das Ergebnis ist klarer und aromabetonter, weniger konzentriert.</p>\n<p>Bei Pour-Over-Methoden ist das <b>Blooming</b> typisch: kurzes Vorbenetzen, damit frischer Kaffee entgast (CO2 entweicht), bevor gleichmäßig aufgegossen wird. Filterpapier hält Öle zurück (klarere Tasse), Metallfilter lassen sie durch (vollmundiger).</p><p>Eng verwandt ist der Artikel <a class=\"ilink\" data-s=\"milch-latte\">Milch & Latte Art</a>.</p>", "rel": []}, {"slug": "maschine-wartung", "title": "Maschine & Wartung", "crumb": "Zubereitung", "body": "<p>Espressomaschinen unterscheiden sich in der Temperaturstabilität: <b>Einkreiser</b>, <b>Zweikreiser</b> (HX) und <b>Dualboiler</b> (getrennte Kessel für Brühen und Dampf, am stabilsten). <b>PID</b>-Steuerungen halten die Temperatur präzise.</p>\n<p>Regelmäßige Pflege ist entscheidend: <b>Rückspülen</b> (Backflush) mit Blindsieb und Reiniger, Entfernen alter Kaffeeöle, sowie <b>Entkalken</b> je nach Wasserhärte. Eine gepflegte Maschine schmeckt sauberer und hält länger.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"milch-latte\">Milch & Latte Art</a>, <a class=\"ilink\" data-s=\"mahlen-dosieren\">Mahlen & Dosieren</a> und <a class=\"ilink\" data-s=\"bruehmethoden\">Brühmethoden</a>.</p>", "rel": []}, {"slug": "extraktion-kennzahlen", "title": "Extraktion & Kennzahlen", "crumb": "Theorie & Technik", "body": "<p>Zwei Kennzahlen beschreiben die Tasse objektiv: <b>TDS</b> (Total Dissolved Solids, der Anteil gelöster Feststoffe, gemessen per Refraktometer) und die daraus berechnete <b>Extraktionsausbeute</b> (Extraction Yield). Für Filterkaffee gilt ein „Goldener Standard\" von etwa <b>18–22 % Ausbeute</b>.</p>\n<p>Die <b>Brew Ratio</b> (Verhältnis Kaffee zu <a class=\"ilink\" data-s=\"wasser\">Wasser</a>) steuert die Stärke, der <b><a class=\"ilink\" data-s=\"mahlen-dosieren\">Mahlgrad</a></b> die Ausbeute. Wer reproduzierbar arbeiten will, wiegt Einwaage und Auslauf mit der Waage und misst die Zeit – Kaffee wird so vom Zufall zum Rezept.</p><p>Eng verwandt ist der Artikel <a class=\"ilink\" data-s=\"troubleshooting\">Troubleshooting</a>.</p>", "rel": []}, {"slug": "wasser", "title": "Wasser", "crumb": "Theorie & Technik", "body": "<p>Kaffee besteht zu über 98 % aus <b>Wasser</b>, daher ist dessen Zusammensetzung entscheidend. Wichtig sind <b>Gesamthärte</b> (v. a. Magnesium/Calcium, fördert <a class=\"ilink\" data-s=\"extraktion-kennzahlen\">Extraktion</a>) und <b>Karbonathärte/Alkalinität</b> (puffert Säure ab). Die <b>SCA</b> empfiehlt rund 50–175 ppm Gesamthärte bei moderater Alkalinität.</p>\n<p>Zu hartes/karbonatreiches Wasser verkalkt die Maschine und dämpft die Säure; zu weiches Wasser kann flach und sauer schmecken. Aufbereitung per Filter oder remineralisiertem Wasser verbessert Geschmack und schützt die Technik.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"troubleshooting\">Troubleshooting</a> und <a class=\"ilink\" data-s=\"espresso-grundlagen\">Espresso-Grundlagen</a>.</p>", "rel": []}, {"slug": "troubleshooting", "title": "Troubleshooting", "crumb": "Theorie & Technik", "body": "<p>Schmeckt der <a class=\"ilink\" data-s=\"espresso-grundlagen\">Espresso</a> <b>sauer und dünn</b>, läuft er meist zu schnell durch → feiner mahlen oder Dosis erhöhen (Unterextraktion). Schmeckt er <b>bitter und adstringierend</b>, läuft er zu langsam → gröber mahlen (Überextraktion).</p>\n<p><b>Channeling</b> (<a class=\"ilink\" data-s=\"wasser\">Wasser</a> bricht sich Bahn durch Risse im Puck) zeigt sich durch spritzende, ungleichmäßige <a class=\"ilink\" data-s=\"extraktion-kennzahlen\">Extraktion</a> und entsteht durch ungleichmäßiges Verteilen oder Tampern. Konstanz bei Dosis, Verteilung und <a class=\"ilink\" data-s=\"mahlen-dosieren\">Mahlgrad</a> ist der Schlüssel zur Fehlersuche – immer nur eine Variable ändern.</p>", "rel": []}, {"slug": "anbau-verarbeitung", "title": "Anbau & Verarbeitung", "crumb": "Bohne & Röstung", "body": "<p>Die zwei wichtigsten Arten sind <b><a class=\"ilink\" data-s=\"arabica-robusta\">Arabica</a></b> (aromatischer, säurereicher, höhere Lagen) und <b>Robusta</b> (kräftiger, bitterer, mehr Koffein, robuster). Kaffee wächst im „Bohnengürtel\" rund um den Äquator; Höhenlage, Boden und Klima prägen den Charakter.</p>\n<p>Nach der Ernte wird die Kaffeekirsche <b>aufbereitet</b>: <b>gewaschen</b> (washed, klar und sauber), <b>natural</b> (an der Frucht getrocknet, fruchtig-intensiv) oder <b>honey/pulped natural</b> (dazwischen). Die Methode beeinflusst das Geschmacksprofil erheblich.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"roestung\">Röstung</a> und <a class=\"ilink\" data-s=\"green-grading\">Green Grading & Defekte</a>.</p>", "rel": []}, {"slug": "arabica-robusta", "title": "Arabica & Robusta", "crumb": "Bohne & Röstung", "body": "<p class=\"lead\">Die zwei wirtschaftlich wichtigsten Kaffeearten.</p>\n<p><b>Arabica</b> ist feiner, säurebetont und wächst in höheren Lagen; <b>Robusta</b> ist kräftiger, bitterer, hat mehr Koffein und ist widerstandsfähiger. Höhe, Klima und <a class=\"ilink\" data-s=\"anbau-verarbeitung\">Aufbereitung</a> prägen das Aromaprofil zusätzlich.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"roestung\">Röstung</a> und <a class=\"ilink\" data-s=\"green-grading\">Green Grading & Defekte</a>.</p>", "rel": []}, {"slug": "roestung", "title": "Röstung", "crumb": "Bohne & Röstung", "body": "<p>Beim <b>Rösten</b> wandeln sich grüne Bohnen durch Hitze chemisch (u. a. <b>Maillard-Reaktion</b> und Karamellisierung). Hörbare Marken sind der <b>First Crack</b> (heller Röstgrad beginnt) und der <b>Second Crack</b> (dunkle Röstung). Helle Röstungen betonen Herkunft und Säure, dunkle Röstungen Röstaromen und Bitterkeit.</p>\n<p>Frisch gerösteter Kaffee gast CO2 aus; eine Ruhezeit von einigen Tagen (Degassing) verbessert die <a class=\"ilink\" data-s=\"extraktion-kennzahlen\">Extraktion</a>. Kaffee ist ein Frischeprodukt – nach dem Öffnen rasch verbrauchen, kühl, trocken und luftdicht lagern.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"anbau-verarbeitung\">Anbau & Verarbeitung</a> und <a class=\"ilink\" data-s=\"arabica-robusta\">Arabica & Robusta</a>.</p>", "rel": []}, {"slug": "green-grading", "title": "Green Grading & Defekte", "crumb": "Bohne & Röstung", "body": "<p><b>Green Grading</b> ist die Bewertung des Rohkaffees (grüne Bohnen) vor der <a class=\"ilink\" data-s=\"roestung\">Röstung</a>. Geprüft werden Größe (<b>Screen Size</b>), Feuchte, Dichte und vor allem <b>Defekte</b>. Man unterscheidet primäre Defekte (z. B. schwarze, saure Bohnen, Steine) und sekundäre (z. B. Bruch, Muschelbohnen).</p>\n<p>Für <b>Specialty-Kaffee</b> gelten strenge Grenzen (sehr wenige Defekte pro Probe). Fehler im Rohkaffee – etwa fermentierte oder schimmlige Bohnen – lassen sich durch Rösten nicht mehr ausgleichen.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"anbau-verarbeitung\">Anbau & Verarbeitung</a> und <a class=\"ilink\" data-s=\"arabica-robusta\">Arabica & Robusta</a>.</p>", "rel": []}, {"slug": "cupping", "title": "Cupping & Sensorik", "crumb": "Sensorik", "body": "<p><b>Cupping</b> ist das standardisierte Verkosten zur Qualitätsbewertung: gemahlener Kaffee wird mit heißem <a class=\"ilink\" data-s=\"wasser\">Wasser</a> aufgegossen, die Kruste „gebrochen\" und gerochen, dann mit dem Löffel geschlürft. Bewertet werden u. a. <b>Aroma, Acidity (Säure), Body (Körper), Flavor, Aftertaste, Balance</b> und Sauberkeit.</p>\n<p>Die <b>SCA</b> nutzt ein 100-Punkte-Schema; ab 80 Punkten gilt Kaffee als <b>Specialty</b>. „Säure\" ist hier positiv gemeint – sie steht für lebendige, fruchtige Klarheit, nicht für Sauerkeit.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"aromarad\">Aromarad</a> und <a class=\"ilink\" data-s=\"espresso-grundlagen\">Espresso-Grundlagen</a>.</p>", "rel": []}, {"slug": "aromarad", "title": "Aromarad", "crumb": "Sensorik", "body": "<p class=\"lead\">Das Coffee Taster\\u2019s Flavor Wheel ordnet Kaffeenoten von groben Familien bis zu feinen Einzelaromen. Klick dich durch die Ebenen.</p><iframe class=\"aromaframe\" data-base=\"aromarad.html\" src=\"aromarad.html?theme=light\" title=\"Aromarad\" loading=\"lazy\"></iframe><p style=\"margin-top:12px\">Riechen liefert den größten Teil des „Geschmacks\" (retronasal).</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"cupping\">Cupping & Sensorik</a>, <a class=\"ilink\" data-s=\"espresso-grundlagen\">Espresso-Grundlagen</a> und <a class=\"ilink\" data-s=\"crema\">Crema</a>.</p>", "rel": []}, {"slug": "standards-geschichte", "title": "Standards & Geschichte", "crumb": "Hintergrund", "body": "<p>Die <b>Specialty Coffee Association (SCA)</b> setzt internationale Standards für <a class=\"ilink\" data-s=\"cupping\">Cupping</a>, <a class=\"ilink\" data-s=\"wasser\">Wasser</a> und <a class=\"ilink\" data-s=\"roestung\">Röstung</a>. Historisch verbreitete sich Kaffee von Äthiopien und der arabischen Halbinsel über Europa in die Welt; <a class=\"ilink\" data-s=\"espresso-grundlagen\">Espresso</a> und die Siebträgermaschine prägten im 20. Jahrhundert Italien.</p>\n<p>Die „<b>Wellen</b>\" der Kaffeekultur beschreiben die Entwicklung: erste Welle (Massenware), zweite Welle (Coffeeshops, Espressokultur), dritte Welle (Kaffee als Genuss- und Herkunftsprodukt, Transparenz vom Anbau bis zur Tasse).</p>", "rel": []}, {"slug": "quellen", "title": "Quellen & Weiterlesen", "crumb": "Service", "body": "<p class=\"lead\">Wo du dein Wissen vertiefen kannst:</p>\n<ul><li><b>The World Atlas of Coffee</b> (James Hoffmann) – modernes Standardwerk.</li>\n<li><b>Scott Rao</b> – Fachbücher zu <a class=\"ilink\" data-s=\"espresso-grundlagen\">Espresso</a>, Filter und <a class=\"ilink\" data-s=\"roestung\">Röstung</a>.</li>\n<li><b>Specialty Coffee Association</b> – sca.coffee, Standards und <a class=\"ilink\" data-s=\"cupping\">Cupping</a>-Protokoll.</li>\n<li><b>Barista Hustle</b> – baristahustle.com, fundierte Technik.</li>\n<li><b>James Hoffmann (YouTube)</b> – praxisnahe Videos.</li></ul>", "rel": []}], "tree": [{"name": "Espresso", "ic": "☕", "slugs": ["espresso-grundlagen", "crema"], "subs": []}, {"name": "Zubereitung", "ic": "🥛", "slugs": ["milch-latte", "mahlen-dosieren", "bruehmethoden", "maschine-wartung"], "subs": []}, {"name": "Theorie & Technik", "ic": "📊", "slugs": ["extraktion-kennzahlen", "wasser", "troubleshooting"], "subs": []}, {"name": "Bohne & Röstung", "ic": "🌱", "slugs": ["anbau-verarbeitung", "arabica-robusta", "roestung", "green-grading"], "subs": []}, {"name": "Sensorik", "ic": "👃", "slugs": ["cupping", "aromarad"], "subs": []}, {"name": "Hintergrund", "ic": "📐", "slugs": ["standards-geschichte"], "subs": []}, {"name": "Service", "ic": "📚", "slugs": ["quellen"], "subs": []}]};
var root=document.documentElement;
// ---- theme ----
function initTheme(){var p=new URLSearchParams(location.search).get('theme');var t;
  if(p==='dark'||p==='light')t=p;else{try{t=localStorage.getItem('nsw_theme')||'light'}catch(e){t='light'}}
  applyTheme(t);}
function applyTheme(t){if(t==='dark'){root.setAttribute('data-theme','dark');}else{root.removeAttribute('data-theme');}
  document.getElementById('themebtn').textContent=(t==='dark')?'☀️':'🌙';curTheme=t;
  // update any embedded aroma iframe
  var af=document.querySelector('.aromaframe');if(af){var u=af.getAttribute('data-base');af.src=u+'?theme='+t;}}
var curTheme='light';
document.getElementById('themebtn').onclick=function(){var t=curTheme==='dark'?'light':'dark';try{localStorage.setItem('nsw_theme',t)}catch(e){}applyTheme(t);};
// ---- index ----
var BYSLUG={};APP.articles.forEach(function(a){BYSLUG[a.slug]=a;});
document.title=APP.title+' – Nachschlagewerk';
document.getElementById('brand').innerHTML=APP.brand;
document.getElementById('logo').textContent=APP.ic;
root.style.setProperty('--brand',APP.color);
var meta=document.createElement('meta');meta.name='theme-color';meta.content=APP.color;document.head.appendChild(meta);
// ---- sidebar ----
function buildSidebar(){
  var side=document.getElementById('side');side.innerHTML='';
  APP.tree.forEach(function(c,ci){
    var cat=document.createElement('div');cat.className='cat'+(ci>0?' collapsed':'');
    var btn=document.createElement('button');btn.className='catname';btn.innerHTML=(c.ic?c.ic+' ':'')+c.name+'<span class="tw">▾</span>';
    btn.onclick=function(){cat.classList.toggle('collapsed');};
    cat.appendChild(btn);
    var ch=document.createElement('div');ch.className='children';
    (c.slugs||[]).forEach(function(s){ch.appendChild(mkA(s));});
    (c.subs||[]).forEach(function(sub){
      var sn=document.createElement('div');sn.className='subname';sn.textContent=sub.name;ch.appendChild(sn);
      sub.slugs.forEach(function(s){ch.appendChild(mkA(s));});
    });
    cat.appendChild(ch);side.appendChild(cat);
  });
}
function mkA(slug){var a=BYSLUG[slug];var b=document.createElement('button');b.className='alink';b.dataset.s=slug;b.textContent=a?a.title:slug;b.onclick=function(){go(slug);closeSide();};return b;}
// ---- article render ----
function go(slug){
  var a=BYSLUG[slug];if(!a){a=APP.articles[0];slug=a.slug;}
  if(location.hash!=='#'+slug)history.replaceState(null,'','#'+slug);
  document.querySelectorAll('.alink').forEach(function(x){x.classList.toggle('active',x.dataset.s===slug);});
  // expand the cat containing it
  var m=document.getElementById('main');
  var sa="";
  m.innerHTML='<div class="crumb">'+a.crumb+'</div><article class="art"><h1>'+a.title+'</h1>'+a.body+sa+'</article>';
  m.scrollTop=0;window.scrollTo(0,0);
  // wire internal links
  m.querySelectorAll('a.ilink').forEach(function(l){l.onclick=function(e){e.preventDefault();go(l.dataset.s);};});
  m.querySelectorAll('.seealso a').forEach(function(l){l.onclick=function(e){e.preventDefault();go(l.dataset.s);};});
}
function relatedChips(slug){
  var a=BYSLUG[slug];if(!a.rel||!a.rel.length)return '';
  var c=a.rel.map(function(s){var t=BYSLUG[s];return t?'<a data-s="'+s+'">'+t.title+'</a>':'';}).join('');
  return '<div class="seealso"><b>Siehe auch</b><div class="chips">'+c+'</div></div>';
}
// ---- search ----
function strip(s){return (s||'').replace(/<[^>]+>/g,' ');}
document.getElementById('search').addEventListener('input',function(e){
  var q=e.target.value.trim().toLowerCase();
  if(!q){var h=location.hash.slice(1);go(BYSLUG[h]?h:APP.articles[0].slug);return;}
  var hits=APP.articles.filter(function(a){return (a.title+' '+strip(a.body)).toLowerCase().indexOf(q)>-1;}).slice(0,40);
  var m=document.getElementById('main');
  m.innerHTML='<div class="crumb">Suche</div><h1 class="art" style="font-size:24px;margin:0 0 14px">'+hits.length+' Treffer für „'+e.target.value+'"</h1><div class="results"></div>';
  var box=m.querySelector('.results');
  hits.forEach(function(a){var b=document.createElement('button');b.className='alink';b.dataset.s=a.slug;b.textContent=a.title;b.onclick=function(){go(a.slug);};box.appendChild(b);});
  if(!hits.length)m.querySelector('.results').innerHTML='<p class="muted">Nichts gefunden.</p>';
});
// ---- mobile ----
function closeSide(){document.getElementById('side').classList.remove('open');document.getElementById('backdrop').classList.remove('open');}
document.getElementById('menubtn').onclick=function(){document.getElementById('side').classList.toggle('open');document.getElementById('backdrop').classList.toggle('open');};
document.getElementById('backdrop').onclick=closeSide;
// ---- init ----
document.getElementById('logo').onclick=function(){go(APP.articles[0].slug);closeSide();};
initTheme();buildSidebar();
var start=location.hash.slice(1);go(BYSLUG[start]?start:APP.articles[0].slug);
window.addEventListener('hashchange',function(){var h=location.hash.slice(1);if(h&&BYSLUG[h])go(h);});
</script>
</body>
</html>
