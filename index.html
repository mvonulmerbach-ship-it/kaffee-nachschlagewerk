<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nachschlagewerk</title>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Kaffee">
<style>
:root{--bg:#f7f6f2;--panel:#fff;--ink:#1c1b18;--muted:#6b6862;--line:#e7e4dc;
  --brand:#3b6e58;--brandink:#fff;--soft:#eef0ee;--gold:#c79a2b;
  --shadow:0 8px 24px rgba(40,30,20,.07);
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.55;-webkit-text-size-adjust:100%}
header{position:sticky;top:0;z-index:10;background:rgba(247,246,242,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.hd{max-width:920px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:20px;
  background:linear-gradient(150deg,var(--brand),#0000),var(--brand);color:#fff;box-shadow:var(--shadow)}
.ttl b{font-size:17px;font-weight:800}
.ttl span{display:block;font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.tabs{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.tabs button{font:inherit;font-size:13px;font-weight:600;color:var(--muted);background:transparent;border:1px solid transparent;border-radius:999px;padding:7px 14px;cursor:pointer}
.tabs button.active{color:var(--brandink);background:var(--brand)}
main{max-width:920px;margin:0 auto;padding:18px 16px 70px}
.view{display:none}.view.active{display:block}
.search{width:100%;font:inherit;font-size:15px;color:var(--ink);background:var(--panel);border:1.5px solid var(--line);border-radius:12px;padding:12px 15px;margin-bottom:14px}
.search:focus{outline:none;border-color:var(--brand)}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.chip{font:inherit;font-size:12.5px;font-weight:600;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:6px 12px;cursor:pointer}
.chip.active{color:var(--brandink);background:var(--brand);border-color:transparent}
.catblock{margin-bottom:26px}
.catblock h2{font-size:20px;margin:0 0 10px;padding-bottom:6px;border-bottom:2px solid var(--line)}
.catblock h2 .ic{margin-right:6px}
.article{background:var(--soft);border:1px solid var(--line);border-left:4px solid var(--brand);border-radius:13px;padding:14px 18px;margin-bottom:14px;font-size:14.5px;color:#33312c}
.article p{margin:0 0 9px}.article p:last-child{margin:0}.article b{color:var(--ink)}
.factlabel{font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin:4px 0 8px}
.entry{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow)}
.entry .q{font-weight:700;font-size:15px}
.entry .ans{margin-top:4px;font-size:14px}
.entry .ans b2{}
.entry .ans .lab{color:var(--brand);font-weight:700}
.entry .fb{margin-top:6px;font-size:14px;color:#3a3833}
.entry .fb b{color:var(--ink)}
.count{color:var(--muted);font-size:13px;margin-bottom:14px}
.src{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow)}
.src b{font-size:15px}
.src p{margin:3px 0 0;color:var(--muted);font-size:14px}
.lead{color:var(--muted);max-width:640px;margin:0 0 16px}
.iframe-wrap{border:1px solid var(--line);border-radius:13px;overflow:hidden;box-shadow:var(--shadow);background:var(--panel)}
.iframe-wrap iframe{width:100%;height:78vh;border:0;display:block}
.empty{color:var(--muted);padding:30px 0;text-align:center}
footer{max-width:920px;margin:0 auto;padding:0 16px 40px;color:var(--muted);font-size:12px;text-align:center}
@media(max-width:560px){.hd{padding:10px 12px}.tabs{margin-left:0;width:100%}main{padding:14px 12px 60px}}
</style>
</head>
<body>
<header>
  <div class="hd">
    <div class="logo" id="logo"></div>
    <div class="ttl"><b id="brand"></b><span>Nachschlagewerk</span></div>
    <div class="tabs" id="tabs"></div>
  </div>
</header>
<main>
  <section class="view active" id="v-look">
    <input class="search" id="search" placeholder="Suchen … (Begriff, Antwort, Stichwort)">
    <div class="chips" id="chips"></div>
    <div class="count" id="count"></div>
    <div id="list"></div>
  </section>
  <section class="view" id="v-aroma">
    <p class="lead">Das interaktive Aromarad – klick dich durch Kategorien und Aromen.</p>
    <div class="iframe-wrap"><iframe src="aromarad.html" title="Aromarad" loading="lazy"></iframe></div>
  </section>
  <section class="view" id="v-src">
    <p class="lead">Wo findest du mehr? Empfehlenswerte, verlässliche Quellen zum Vertiefen.</p>
    <div id="srclist"></div>
  </section>
</main>
<footer id="foot"></footer>
<script>
const APP={"title": "Kaffee", "brand": "Bari<b>sta</b>", "color": "#6f4e37", "ic": "☕", "aroma": true, "order": ["Espresso-Grundlagen", "Milch & Latte Art", "Mahlen & Dosieren", "Maschine & Wartung", "Brühmethoden", "Troubleshooting", "Extraktion & Kennzahlen", "Cupping & Sensorik", "Röstung", "Wasser", "Anbau & Verarbeitung", "Green Grading & Defekte", "Standards & Geschichte", "Aromarad & Sensorik"], "icons": {"Espresso-Grundlagen": "☕", "Milch & Latte Art": "🥛", "Mahlen & Dosieren": "⚙️", "Maschine & Wartung": "🔧", "Brühmethoden": "💧", "Troubleshooting": "🛠️", "Extraktion & Kennzahlen": "📊", "Cupping & Sensorik": "👃", "Röstung": "🔥", "Wasser": "💧", "Anbau & Verarbeitung": "🌱", "Green Grading & Defekte": "🫘", "Standards & Geschichte": "📐", "Aromarad & Sensorik": "🎡"}, "entries": [{"cat": "Espresso-Grundlagen", "q": "Welches Verhältnis (Ratio) beschreibt einen klassischen Espresso?", "ans": "1:2", "fb": "Ein typischer Espresso nutzt eine <b>Ratio von ca. 1:2</b>, z. B. 18 g Kaffee zu 36 g Getränk."}, {"cat": "Espresso-Grundlagen", "q": "Mit welchem Brühdruck arbeitet eine klassische Espressomaschine?", "ans": "9 bar", "fb": "Der Standard-Brühdruck für Espresso liegt bei <b>9 bar</b>."}, {"cat": "Espresso-Grundlagen", "q": "Wie lange dauert eine typische Espresso-Extraktion (Sekunden)?", "ans": "ca. 27 s (±4)", "fb": "Eine klassische Extraktion dauert etwa <b>25-30 s</b>."}, {"cat": "Espresso-Grundlagen", "q": "Welche Wassertemperatur ist für Espresso üblich (Grad C)?", "ans": "ca. 93 Grad C (±3)", "fb": "Die Brühtemperatur liegt meist bei <b>90-96 Grad C</b>."}, {"cat": "Espresso-Grundlagen", "q": "Beim Tampern wird das Kaffeemehl im Siebträger gleichmäßig verdichtet.", "ans": "Wahr", "fb": "Tampern verdichtet den Puck gleichmäßig, damit das Wasser nicht ungleichmäßig durchläuft."}, {"cat": "Espresso-Grundlagen", "q": "Ein Ristretto wird mit mehr Wasser als ein normaler Espresso gezogen.", "ans": "Falsch", "fb": "Ein <b>Ristretto</b> ist kürzer und konzentrierter (z. B. Ratio 1:1), nicht länger."}, {"cat": "Espresso-Grundlagen", "q": "Was bezeichnet 'Channeling' bei der Espresso-Extraktion?", "ans": "Wasser sucht sich Kanäle durch den Puck", "fb": "Beim <b>Channeling</b> fließt Wasser durch Kanäle, was zu ungleichmäßiger Extraktion führt."}, {"cat": "Espresso-Grundlagen", "q": "Ein Lungo unterscheidet sich vom Espresso vor allem durch ...", "ans": "längere Durchlaufmenge / mehr Wasser", "fb": "Ein <b>Lungo</b> läuft länger durch und ergibt ein größeres, dünneres Getränk."}, {"cat": "Espresso-Grundlagen", "q": "Eine typische Espresso-Dosis (Doppio) liegt bei etwa ___ Gramm Kaffeemehl.", "ans": "18", "fb": "Übliche Dosierung im doppelten Sieb: <b>18-20 g</b>."}, {"cat": "Espresso-Grundlagen", "q": "Bringe die Schritte der Puck-Prep in die richtige Reihenfolge.", "ans": "Dosieren → Verteilen / WDT → Tampern → Siebträger einsetzen → Extraktion starten", "fb": "Erst dosieren und verteilen, dann tampern, einsetzen und extrahieren."}, {"cat": "Espresso-Grundlagen", "q": "Welcher Begriff gehört NICHT zur Espresso-Zubereitung?", "ans": "Bloom", "fb": "<b>Bloom</b> (Blooming) gehört zu Filtermethoden, nicht zur Espresso-Extraktion."}, {"cat": "Espresso-Grundlagen", "q": "Schätze die typische Espresso-Output-Menge bei 18 g Einwaage (Ratio 1:2) in Gramm.", "ans": "ca. 36 g (±4)", "fb": "18 g bei 1:2 ergeben rund <b>36 g</b> Output."}, {"cat": "Espresso-Grundlagen", "q": "Crema ist die goldbraune Schaumschicht auf einem frisch gezogenen Espresso.", "ans": "Wahr", "fb": "Die <b>Crema</b> entsteht aus emulgierten Ölen und gelöstem CO2."}, {"cat": "Espresso-Grundlagen", "q": "Welche Maßnahme erhöht tendenziell die Durchlaufzeit eines zu schnell laufenden Espressos?", "ans": "Feinerer Mahlgrad", "fb": "Ein <b>feinerer Mahlgrad</b> erhöht den Widerstand und verlangsamt den Durchlauf."}, {"cat": "Espresso-Grundlagen", "q": "Welche Ratio passt am ehesten zu einem Ristretto?", "ans": "1:1", "fb": "Ein <b>Ristretto</b> ist sehr konzentriert, etwa Ratio 1:1."}, {"cat": "Espresso-Grundlagen", "q": "Was ist ein 'Doppio'?", "ans": "Ein doppelter Espresso", "fb": "Ein <b>Doppio</b> ist ein doppelter Espresso aus dem doppelten Sieb."}, {"cat": "Espresso-Grundlagen", "q": "Ordne von kürzester zu längster Getränkemenge (gleiche Einwaage).", "ans": "Ristretto → Espresso → Lungo", "fb": "Ristretto ist am kürzesten, Lungo am längsten."}, {"cat": "Espresso-Grundlagen", "q": "Bei gleicher Einwaage führt ein längerer Bezug (mehr Output) tendenziell zu höherer Extraktion.", "ans": "Wahr", "fb": "Mehr Wasser löst mehr Feststoffe - bis zur Überextraktion."}, {"cat": "Milch & Latte Art", "q": "Auf welche Temperatur sollte Milch beim Aufschäumen maximal erhitzt werden (Grad C)?", "ans": "ca. 63 Grad C (±4)", "fb": "Ideal sind etwa <b>60-65 Grad C</b>; darüber wird die Milch kochig."}, {"cat": "Milch & Latte Art", "q": "Wie nennt man den feinporigen Milchschaum für Latte Art?", "ans": "Mikroschaum", "fb": "<b>Mikroschaum</b> ist feinporig und glänzend - ideal für Latte Art."}, {"cat": "Milch & Latte Art", "q": "Bringe die Phasen des Milchschäumens in die richtige Reihenfolge.", "ans": "Dampflanze knapp unter die Oberfläche → Ziehphase (Luft einziehen) → Lanze tiefer eintauchen → Rollphase (Wirbel / Texturieren) → Dampf stoppen und Kännchen abklopfen", "fb": "Erst Luft ziehen, dann durch Wirbeln texturieren."}, {"cat": "Milch & Latte Art", "q": "Ordne Getränk und typisches Verhältnis zu.", "ans": "Cappuccino ↔ ca. 1/3 Espresso, 1/3 Milch, 1/3 Schaum; Latte Macchiato ↔ viel Milch, wenig Schaum, Espresso obenauf; Flat White ↔ Doppel-Espresso, wenig dünner Mikroschaum; Espresso Macchiato ↔ Espresso mit nur einem Klecks Schaum", "fb": "Die Verhältnisse unterscheiden die Milchgetränke."}, {"cat": "Milch & Latte Art", "q": "Ein Flat White enthält im Verhältnis mehr Schaum als ein klassischer Cappuccino.", "ans": "Falsch", "fb": "Ein <b>Flat White</b> hat eine dünnere Mikroschaumschicht und wirkt flacher."}, {"cat": "Milch & Latte Art", "q": "Was passiert, wenn Milch über ca. 70 Grad C erhitzt wird?", "ans": "Proteine denaturieren, kochiger Geschmack", "fb": "Über ca. 70 Grad C denaturieren Proteine, die Milch schmeckt kochig und der Schaum bricht zusammen."}, {"cat": "Milch & Latte Art", "q": "Welcher Begriff gehört NICHT zum Milchschäumen?", "ans": "Backflush", "fb": "<b>Backflush</b> ist eine Reinigungsmethode der Brühgruppe, nicht Teil des Schäumens."}, {"cat": "Milch & Latte Art", "q": "Die süßliche Wahrnehmung beim Aufschäumen entsteht u. a. durch den Milchzucker ___.", "ans": "Laktose", "fb": "<b>Laktose</b> wird durch Erwärmen besser wahrnehmbar; Überhitzen zerstört diesen Effekt."}, {"cat": "Milch & Latte Art", "q": "Welches Werkzeug dient dem Aufschäumen der Milch an der Espressomaschine?", "ans": "Dampflanze", "fb": "Die <b>Dampflanze</b> (Steam Wand) erhitzt und texturiert die Milch."}, {"cat": "Milch & Latte Art", "q": "Welches Latte-Art-Motiv gilt als Einsteiger-Klassiker?", "ans": "Herz", "fb": "Das <b>Herz</b> ist das gängigste Einsteigermotiv."}, {"cat": "Milch & Latte Art", "q": "Wie hoch ist grob der Schaum-Anteil eines klassischen Cappuccinos in Prozent (Drittel-Regel)?", "ans": "ca. 33 % (±10)", "fb": "Grob ein Drittel, also rund <b>33 %</b> Schaum."}, {"cat": "Milch & Latte Art", "q": "Welches Getränk enthält normalerweise KEINE aufgeschäumte Milch?", "ans": "Ristretto", "fb": "Ein <b>Ristretto</b> ist ein reiner, kurzer Espresso ohne Milch."}, {"cat": "Mahlen & Dosieren", "q": "Dein Espresso läuft zu schnell durch und schmeckt sauer. Was tun?", "ans": "Feiner mahlen", "fb": "Zu schneller, saurer Espresso = unterextrahiert, also <b>feiner mahlen</b>."}, {"cat": "Mahlen & Dosieren", "q": "Dein Espresso tropft sehr langsam und schmeckt bitter. Welche Korrektur?", "ans": "Gröber mahlen", "fb": "Sehr langsam und bitter = überextrahiert, also <b>gröber mahlen</b>."}, {"cat": "Mahlen & Dosieren", "q": "Ordne Mühlentyp / Begriff der Beschreibung zu.", "ans": "Scheibenmahlwerk ↔ zwei parallele Scheiben, gleichmäßig; Kegelmahlwerk ↔ Kegel im Ring, mahlt kühler / langsamer; WDT ↔ Auflockern des Mehls mit Nadeln; RDT ↔ Tropfen Wasser gegen statische Aufladung", "fb": "Mühlentypen und Vorbereitungstechniken im Überblick."}, {"cat": "Mahlen & Dosieren", "q": "Die Technik mit dünnen Nadeln zum Auflockern des Kaffeemehls heißt ___ (Abkürzung).", "ans": "WDT", "fb": "<b>WDT</b> (Weiss Distribution Technique) verteilt das Mehl und reduziert Klumpen / Channeling."}, {"cat": "Mahlen & Dosieren", "q": "Ein Tropfen Wasser auf die Bohnen gegen statische Aufladung nennt man ___ (Abkürzung).", "ans": "RDT", "fb": "<b>RDT</b> (Ross Droplet Technique) reduziert statische Aufladung und Spritzer beim Mahlen."}, {"cat": "Mahlen & Dosieren", "q": "Frisch gemahlener Kaffee ist statisch oft stärker aufgeladen als ganze Bohnen.", "ans": "Wahr", "fb": "Beim Mahlen entsteht Reibung und damit statische Aufladung; RDT hilft dagegen."}, {"cat": "Mahlen & Dosieren", "q": "Welcher Mahlgrad passt NICHT zu Espresso?", "ans": "grob wie French Press", "fb": "<b>Grob</b> wie French Press ist für Espresso viel zu grob."}, {"cat": "Mahlen & Dosieren", "q": "Welche Aussage zur Dosierung ('Dosing') stimmt?", "ans": "Konsistente Einwaage sorgt für reproduzierbare Ergebnisse", "fb": "Eine <b>konsistente Einwaage</b> ist Grundlage für reproduzierbaren Espresso."}, {"cat": "Mahlen & Dosieren", "q": "Ein gröberer Mahlgrad beschleunigt in der Regel die Espresso-Durchlaufzeit.", "ans": "Wahr", "fb": "Gröber = weniger Widerstand = <b>schnellerer</b> Durchlauf."}, {"cat": "Mahlen & Dosieren", "q": "Welcher Begriff beschreibt KEINE Verteilungs- oder Vorbereitungstechnik?", "ans": "Backflush", "fb": "<b>Backflush</b> ist Reinigung, keine Puck-Vorbereitung."}, {"cat": "Mahlen & Dosieren", "q": "Wie viele Gramm wiegt eine typische Einzel-Espressodosis (Single)?", "ans": "ca. 9 g (±2)", "fb": "Eine Single liegt grob bei <b>8-10 g</b>."}, {"cat": "Maschine & Wartung", "q": "Wozu dient das 'Backflushing' (Rückspülen)?", "ans": "Brühgruppe / Dusche reinigen", "fb": "<b>Backflushing</b> mit Blindsieb reinigt Brühgruppe und Dreiwegeventil von Kaffeefett."}, {"cat": "Maschine & Wartung", "q": "Backflushing wird mit einem Blindsieb (ohne Löcher) durchgeführt.", "ans": "Wahr", "fb": "Das <b>Blindsieb</b> lässt kein Wasser durch, sodass Druck zurück in die Gruppe gespült wird."}, {"cat": "Maschine & Wartung", "q": "Eine ___-Steuerung hält die Brühtemperatur der Maschine konstant (Abkürzung).", "ans": "PID", "fb": "Ein <b>PID</b>-Regler regelt die Temperatur präzise und stabil."}, {"cat": "Maschine & Wartung", "q": "Womit entfernt man Kalkablagerungen im Wasserkreislauf?", "ans": "Entkalker (Säurelösung)", "fb": "<b>Entkalken</b> löst Kalk im Boiler und in Leitungen; Backflush reinigt dagegen Kaffeefett."}, {"cat": "Maschine & Wartung", "q": "Welches Teil gehört NICHT direkt zur Brühgruppe?", "ans": "Dampflanze", "fb": "Die <b>Dampflanze</b> gehört zum Milchsystem, nicht zur Brühgruppe."}, {"cat": "Maschine & Wartung", "q": "Was beschreibt 'Druckprofiling' (Pressure Profiling)?", "ans": "Gezieltes Verändern des Drucks während der Extraktion", "fb": "Beim <b>Druckprofiling</b> wird der Druckverlauf gezielt gesteuert (z. B. niedrig starten)."}, {"cat": "Maschine & Wartung", "q": "Bringe eine einfache tägliche Reinigungsroutine in sinnvolle Reihenfolge.", "ans": "Siebträger und Sieb ausspülen → Brühgruppe spülen (Flush) → Dampflanze kurz abblasen → Dampflanze außen abwischen → Tropfschale leeren", "fb": "Eine konsistente Routine hält die Maschine sauber."}, {"cat": "Maschine & Wartung", "q": "Hartes Wasser begünstigt Kalkablagerungen in der Espressomaschine.", "ans": "Wahr", "fb": "Viel Calcium / Magnesium (hartes Wasser) führt schneller zu <b>Kalk</b>."}, {"cat": "Maschine & Wartung", "q": "Was ist der Siebträger?", "ans": "Der Halter mit Sieb für das Kaffeemehl", "fb": "Der <b>Siebträger</b> (Portafilter) hält das Sieb mit dem Kaffeepuck."}, {"cat": "Maschine & Wartung", "q": "Ein PID-Regler ist vor allem für stabile Brühtemperaturen zuständig.", "ans": "Wahr", "fb": "Der <b>PID</b> hält die Temperatur konstant statt sie nur grob zu schalten."}, {"cat": "Maschine & Wartung", "q": "Welche Tätigkeit ist KEINE regelmäßige Wartung?", "ans": "Bohnen rösten", "fb": "<b>Rösten</b> ist keine Maschinenwartung."}, {"cat": "Brühmethoden", "q": "Was bezeichnet das 'Blooming' bei Filterkaffee?", "ans": "Das Vorquellen des Kaffees mit etwas Wasser", "fb": "Beim <b>Blooming</b> wird der Kaffee mit wenig Wasser vorbenetzt, damit CO2 entweicht."}, {"cat": "Brühmethoden", "q": "Welche Brüh-Ratio (Kaffee:Wasser) ist für Filterkaffee typisch? Gib den Teiler an (1:x).", "ans": "ca. 16 Teiler (±1)", "fb": "Filterkaffee liegt grob bei <b>1:15 bis 1:17</b>."}, {"cat": "Brühmethoden", "q": "Ordne Brühmethode und typischen Mahlgrad zu.", "ans": "Espresso ↔ fein; V60 / Pour-over ↔ mittel-fein; French Press ↔ grob; Cold Brew ↔ grob", "fb": "Mahlgrad richtet sich nach Kontaktzeit und Methode."}, {"cat": "Brühmethoden", "q": "Welche Methode ist KEINE Filter- oder Handbrühmethode?", "ans": "Siebträger-Espresso", "fb": "Der <b>Siebträger-Espresso</b> ist eine Druckmethode, keine Filtermethode."}, {"cat": "Brühmethoden", "q": "Cold Brew wird typischerweise mit grobem Mahlgrad und langer Kontaktzeit (Stunden) zubereitet.", "ans": "Wahr", "fb": "<b>Cold Brew</b> extrahiert kalt über 12-24 h mit grobem Mahlgrad."}, {"cat": "Brühmethoden", "q": "Welche Methode arbeitet mit Druck durch einen Kolben und kurzer Brühzeit?", "ans": "AeroPress", "fb": "Die <b>AeroPress</b> presst das Wasser per Kolben durch einen Filter."}, {"cat": "Brühmethoden", "q": "Bringe die Schritte eines V60-Pour-overs in die richtige Reihenfolge.", "ans": "Filter spülen → Kaffee einfüllen → Blooming (vorquellen) → In Kreisen aufgießen → Abtropfen lassen", "fb": "Erst spülen und bloomen, dann gleichmäßig aufgießen."}, {"cat": "Brühmethoden", "q": "Die French Press arbeitet als Vollimmersion; der Kaffee wird am Ende durch ein ___ getrennt.", "ans": "Sieb", "fb": "Das Metall-<b>Sieb</b> drückt den Satz nach unten (Vollimmersion)."}, {"cat": "Brühmethoden", "q": "Wofür ist die Chemex bekannt?", "ans": "Dicker Papierfilter, sehr klarer Body", "fb": "Die <b>Chemex</b> nutzt einen dickeren Papierfilter und liefert einen sehr klaren, sauberen Kaffee."}, {"cat": "Brühmethoden", "q": "Wie viel Wasser brauchst du bei 20 g Kaffee und Ratio 1:16 (in Gramm)?", "ans": "ca. 320 g (±15)", "fb": "20 g mal 16 = <b>320 g</b> Wasser."}, {"cat": "Brühmethoden", "q": "Welche Methode ist eine klassische Vollimmersion?", "ans": "French Press", "fb": "Die <b>French Press</b> ist eine Vollimmersionsmethode."}, {"cat": "Brühmethoden", "q": "Bei der AeroPress kann sowohl Immersion als auch Druck zum Einsatz kommen.", "ans": "Wahr", "fb": "Die <b>AeroPress</b> kombiniert Einweichen (Immersion) mit Kolbendruck."}, {"cat": "Brühmethoden", "q": "Warum spült man den Papierfilter vor dem Brühen oft mit Wasser?", "ans": "Um Filter zu wärmen und Papiergeschmack zu reduzieren", "fb": "Vorspülen entfernt Papiergeschmack und wärmt Filter und Gefäß vor."}, {"cat": "Troubleshooting", "q": "Ein Espresso schmeckt sauer und dünn. Wahrscheinliche Ursache?", "ans": "Unterextraktion", "fb": "Sauer und dünn deutet auf <b>Unterextraktion</b> hin."}, {"cat": "Troubleshooting", "q": "Ein Espresso schmeckt bitter und trocken / adstringierend. Wahrscheinliche Ursache?", "ans": "Überextraktion", "fb": "Bitter und adstringierend = <b>Überextraktion</b>."}, {"cat": "Troubleshooting", "q": "Ordne Symptom und passende Korrektur zu.", "ans": "Zu sauer / unterextrahiert ↔ Feiner mahlen / länger extrahieren; Zu bitter / überextrahiert ↔ Gröber mahlen / kürzer extrahieren; Wenig / blasse Crema ↔ Frischere Bohnen / feiner mahlen; Channeling im Puck ↔ Bessere Verteilung (WDT) / gleichmäßig tampern", "fb": "Jedes Symptom hat eine typische Gegenmaßnahme."}, {"cat": "Troubleshooting", "q": "Sehr alte (entgaste) Bohnen können zu wenig oder blasser Crema führen.", "ans": "Wahr", "fb": "Mit der Zeit entweicht CO2; alte Bohnen liefern weniger <b>Crema</b>."}, {"cat": "Troubleshooting", "q": "Dein Milchschaum hat große, grobe Blasen. Was ist meist die Ursache?", "ans": "Zu viel Luft / zu lange Ziehphase", "fb": "Grobblasiger Schaum entsteht oft, wenn zu viel Luft eingezogen (zu lange Ziehphase) wurde."}, {"cat": "Troubleshooting", "q": "Welche Maßnahme hilft NICHT gegen einen überextrahierten Espresso?", "ans": "Noch feiner mahlen", "fb": "Noch <b>feiner</b> mahlen verstärkt die Überextraktion."}, {"cat": "Troubleshooting", "q": "Ungleichmäßiger Wasserfluss durch Kanäle im Puck heißt ___.", "ans": "Channeling", "fb": "<b>Channeling</b> führt zu gleichzeitiger Unter- und Überextraktion."}, {"cat": "Troubleshooting", "q": "Gleichmäßiges Tampern reduziert die Gefahr von Channeling.", "ans": "Wahr", "fb": "Eine ebene, gleichmäßige Verdichtung beugt Kanalbildung vor."}, {"cat": "Troubleshooting", "q": "Crema ist sehr hell und löst sich schnell auf. Mögliche Ursache?", "ans": "Alte / entgaste Bohnen oder Unterextraktion", "fb": "Helle, instabile Crema deutet oft auf alte Bohnen oder Unterextraktion."}, {"cat": "Troubleshooting", "q": "Bitterer Espresso lässt sich oft durch gröberen Mahlgrad verbessern.", "ans": "Wahr", "fb": "Gröber mahlen reduziert die Extraktion und damit Bitterkeit bei Überextraktion."}, {"cat": "Troubleshooting", "q": "Welche Faktoren können Channeling begünstigen?", "ans": "Ungleichmäßiges Tampern, Klumpen im Kaffeemehl, Risse im Puck, Schräges Tampern", "fb": "Gleichmäßige Verteilung und ebenes Tampern verhindern Channeling - perfekte Verteilung hilft also gerade dagegen."}, {"cat": "Extraktion & Kennzahlen", "q": "Welche Extraktionsausbeute gilt laut SCA als ideal (Mittelwert, %)?", "ans": "ca. 20 % (±2)", "fb": "Das Golden-Cup-Fenster liegt bei <b>18-22 %</b>."}, {"cat": "Extraktion & Kennzahlen", "q": "Welcher TDS-Wert gilt für gebrühten Filterkaffee als ideal (Mittelwert, %)?", "ans": "ca. 1.25 % (±0.12)", "fb": "Idealer TDS-Bereich: <b>1,15-1,35 %</b>."}, {"cat": "Extraktion & Kennzahlen", "q": "Wofür steht TDS in der Kaffee-Kennzahl?", "ans": "Total Dissolved Solids", "fb": "<b>TDS</b> = Total Dissolved Solids, ein Maß für die Stärke (Strength) des Getränks."}, {"cat": "Extraktion & Kennzahlen", "q": "Was beschreibt die Extraktionsausbeute (Extraction Yield)?", "ans": "Anteil des Kaffees, der ins Getränk übergegangen ist", "fb": "Die <b>Extraktionsausbeute</b> ist der prozentuale Anteil löslicher Stoffe, der extrahiert wurde."}, {"cat": "Extraktion & Kennzahlen", "q": "Welche Achsen bildet die SCA Brewing Control Chart primär ab?", "ans": "Strength (TDS) und Extraktionsausbeute", "fb": "Die <b>Brewing Control Chart</b> trägt Strength (TDS) gegen Extraktion auf."}, {"cat": "Extraktion & Kennzahlen", "q": "'Strength' (Stärke) und 'Extraction' (Extraktion) bezeichnen dasselbe.", "ans": "Falsch", "fb": "<b>Strength</b> (TDS, Konzentration) und <b>Extraction</b> (ausgelöster Anteil) sind verschiedene Größen."}, {"cat": "Extraktion & Kennzahlen", "q": "Das Verhältnis von Kaffee zu Wasser nennt man ___ (englischer Fachbegriff).", "ans": "Brew Ratio", "fb": "Die <b>Brew Ratio</b> ist das Verhältnis von Kaffee zu Brühwasser."}, {"cat": "Extraktion & Kennzahlen", "q": "Was beschreibt der 'Golden Cup Standard' grob?", "ans": "Ein Zielfenster aus Stärke und Extraktion für idealen Kaffee", "fb": "Der <b>Golden Cup</b> definiert ein Zielfenster aus Extraktion (~18-22 %) und Stärke (TDS)."}, {"cat": "Extraktion & Kennzahlen", "q": "Welcher Begriff gehört NICHT zu Brüh-Kennzahlen?", "ans": "Agtron", "fb": "<b>Agtron</b> beschreibt den Röstgrad, nicht die Brüh-Kennzahlen."}, {"cat": "Extraktion & Kennzahlen", "q": "Unterextraktion (<18 %) schmeckt eher sauer / grasig, Überextraktion (>22 %) eher bitter.", "ans": "Wahr", "fb": "<18 % = unterextrahiert (sauer), >22 % = überextrahiert (bitter)."}, {"cat": "Extraktion & Kennzahlen", "q": "Eine höhere Brew Ratio (mehr Wasser pro Kaffee) ergibt tendenziell ein schwächeres (niedrigerer TDS) Getränk.", "ans": "Wahr", "fb": "Mehr Wasser pro Gramm Kaffee senkt die Konzentration (TDS)."}, {"cat": "Extraktion & Kennzahlen", "q": "Wenn dein Filterkaffee TDS 1,10 % und Extraktion 16 % hat, ist er ...", "ans": "eher schwach und unterextrahiert", "fb": "Niedriger TDS plus <18 % = eher schwach und <b>unterextrahiert</b>."}, {"cat": "Extraktion & Kennzahlen", "q": "Untere Grenze des idealen Extraktionsfensters nach SCA (%)?", "ans": "ca. 18 % (±1)", "fb": "Die untere Grenze liegt bei <b>18 %</b>."}, {"cat": "Extraktion & Kennzahlen", "q": "Obere Grenze des idealen Extraktionsfensters nach SCA (%)?", "ans": "ca. 22 % (±1)", "fb": "Die obere Grenze liegt bei <b>22 %</b>."}, {"cat": "Extraktion & Kennzahlen", "q": "Welche Größen liest man aus der Brewing Control Chart bzw. braucht man dafür?", "ans": "TDS / Strength, Extraktionsausbeute, Brew Ratio, Brühwassermenge", "fb": "Strength, Extraktion, Ratio und Wassermenge gehören dazu - das Latte-Art-Motiv nicht."}, {"cat": "Cupping & Sensorik", "q": "Wie viel Kaffee schreibt das klassische SCA-Cupping je 150 ml Wasser vor (Gramm)?", "ans": "ca. 8.25 g (±0.5)", "fb": "Die klassische Einwaage ist <b>8,25 g / 150 ml</b>."}, {"cat": "Cupping & Sensorik", "q": "Ab welcher Punktzahl gilt ein Kaffee im klassischen SCA-Cupping als 'Specialty'?", "ans": "ca. 80 Punkte (±1)", "fb": "Ab <b>80 Punkten</b> gilt ein Kaffee als Specialty."}, {"cat": "Cupping & Sensorik", "q": "Welches Brühverhältnis entspricht der klassischen Cupping-Einwaage (8,25 g / 150 ml)?", "ans": "ca. 1:18", "fb": "8,25 g auf 150 ml entsprechen rund <b>1:18,18</b>."}, {"cat": "Cupping & Sensorik", "q": "Wie nennt man das Durchbrechen der Kaffeekruste beim Cupping?", "ans": "Crust break", "fb": "Das <b>Crust break</b> erfolgt nach einigen Minuten Ziehzeit."}, {"cat": "Cupping & Sensorik", "q": "Nach wie vielen Minuten wird beim Cupping üblicherweise die Kruste gebrochen?", "ans": "ca. 4 min (±1)", "fb": "Das Crust break erfolgt nach etwa <b>3-5 Minuten</b>."}, {"cat": "Cupping & Sensorik", "q": "Welche der folgenden Attribute werden im SCA-Cupping bewertet?", "ans": "Fragrance / Aroma, Acidity, Body, Sweetness", "fb": "Bewertet werden u. a. <b>Fragrance/Aroma, Acidity, Body, Sweetness</b> - nicht Mühle oder Verpackung."}, {"cat": "Cupping & Sensorik", "q": "Welche dieser Begriffe sind klassische Cupping-Attribute?", "ans": "Flavor, Aftertaste, Balance, Uniformity, Clean Cup", "fb": "<b>Agtron</b> ist eine Röstmessung; die übrigen sind Cupping-Attribute."}, {"cat": "Cupping & Sensorik", "q": "Ordne Cupping-Attribut und Bedeutung zu.", "ans": "Acidity ↔ wahrgenommene Säure / Lebendigkeit; Body ↔ Mundgefühl / Gewicht; Aftertaste ↔ Nachgeschmack; Uniformity ↔ Gleichmäßigkeit über die Tassen; Clean Cup ↔ Abwesenheit von Fehlnoten", "fb": "Die Attribute beschreiben verschiedene Dimensionen der Tasse."}, {"cat": "Cupping & Sensorik", "q": "Bringe typische Cupping-Schritte in die richtige Reihenfolge.", "ans": "Trockene Fragrance riechen → Mit heißem Wasser aufgießen → Nasse Aroma / Kruste riechen → Kruste brechen → Mit Löffel schlürfen und bewerten", "fb": "Erst trocken riechen, dann aufgießen, brechen und schlürfen."}, {"cat": "Cupping & Sensorik", "q": "Beim Cupping wird der Kaffee laut geschlürft, um ihn breit über die Zunge zu verteilen.", "ans": "Wahr", "fb": "Das <b>Schlürfen</b> verteilt den Kaffee und retronasale Aromen."}, {"cat": "Cupping & Sensorik", "q": "Der Geruch des trockenen, gemahlenen Kaffees beim Cupping heißt ___.", "ans": "Fragrance", "fb": "<b>Fragrance</b> = trockener Duft; <b>Aroma</b> = nasser Geruch nach dem Aufguss."}, {"cat": "Cupping & Sensorik", "q": "Welcher Begriff ist KEIN klassisches Cupping-Attribut?", "ans": "Crema", "fb": "<b>Crema</b> ist ein Espresso-Phänomen, kein Cupping-Score-Attribut."}, {"cat": "Cupping & Sensorik", "q": "Wie heißt der nasse Geruch nach dem Aufgießen beim Cupping?", "ans": "Aroma", "fb": "<b>Aroma</b> ist der Geruch des nassen Kaffees; Fragrance der trockene."}, {"cat": "Cupping & Sensorik", "q": "Die Gesamtnote für den persönlichen Gesamteindruck im Cupping heißt ___.", "ans": "Overall", "fb": "<b>Overall</b> bewertet den subjektiven Gesamteindruck der Verkostung."}, {"cat": "Cupping & Sensorik", "q": "Welcher Schritt gehört NICHT zum Cupping?", "ans": "Tampern", "fb": "<b>Tampern</b> gehört zur Espresso-Zubereitung."}, {"cat": "Röstung", "q": "Bei welcher Bohnentemperatur tritt der 'First Crack' typischerweise auf (Grad C)?", "ans": "ca. 196 Grad C (±6)", "fb": "Der First Crack liegt bei etwa <b>196 Grad C</b>."}, {"cat": "Röstung", "q": "Bei welcher Bohnentemperatur tritt der 'Second Crack' typischerweise auf (Grad C)?", "ans": "ca. 224 Grad C (±6)", "fb": "Der Second Crack liegt bei etwa <b>224 Grad C</b>."}, {"cat": "Röstung", "q": "Welche Reaktion ist hauptverantwortlich für Bräunung und Röstaromen?", "ans": "Maillard-Reaktion", "fb": "Die <b>Maillard-Reaktion</b> erzeugt Bräunung und viele Röstaromen."}, {"cat": "Röstung", "q": "Helle Röstungen betonen tendenziell Säure und fruchtige Noten.", "ans": "Wahr", "fb": "<b>Helle Röstungen</b> bewahren mehr Säure und Herkunftsnoten."}, {"cat": "Röstung", "q": "Dunkle Röstungen sind meist bitterer und körperreicher, mit weniger Säure.", "ans": "Wahr", "fb": "Längeres Rösten baut Säuren ab und betont <b>Bitterkeit / Körper</b>."}, {"cat": "Röstung", "q": "Die Zeit zwischen First Crack und Röstende heißt ___ (englischer Fachbegriff).", "ans": "Development Time", "fb": "Die <b>Development Time</b> nach dem First Crack prägt Süße und Balance."}, {"cat": "Röstung", "q": "Wofür dient die Agtron-Skala?", "ans": "Messung des Röstgrades über Farbe", "fb": "Die <b>Agtron-Skala</b> misst den Röstgrad anhand der Farbe (höhere Zahl = heller)."}, {"cat": "Röstung", "q": "Bringe die Röstphasen in die richtige Reihenfolge.", "ans": "Trocknungsphase → Maillard-Phase → First Crack → Development → Second Crack", "fb": "Trocknen, Maillard, First Crack, Entwicklung, ggf. Second Crack."}, {"cat": "Röstung", "q": "Welcher Begriff gehört NICHT zur Röstung?", "ans": "Crust break", "fb": "<b>Crust break</b> gehört zum Cupping, nicht zur Röstung."}, {"cat": "Röstung", "q": "Ordne Röstgrad und typische Eigenschaft zu.", "ans": "Helle Röstung ↔ mehr Säure, fruchtig; Mittlere Röstung ↔ ausgewogen, mehr Süße; Dunkle Röstung ↔ bitter, körperreich, Röstnoten", "fb": "Mit dunklerem Röstgrad steigen Bitterkeit und Körper."}, {"cat": "Röstung", "q": "Welcher Crack kommt temperaturmäßig zuerst?", "ans": "First Crack", "fb": "Der <b>First Crack</b> (~196 Grad C) liegt vor dem Second Crack (~224 Grad C)."}, {"cat": "Röstung", "q": "Was geschieht in der Trocknungsphase zu Beginn der Röstung?", "ans": "Bohnen geben Restfeuchte ab", "fb": "In der <b>Trocknungsphase</b> verliert die Bohne zunächst Wasser."}, {"cat": "Röstung", "q": "Eine längere Development Time kann Säure abbauen und Süße / Körper betonen.", "ans": "Wahr", "fb": "Mehr Entwicklung nach dem First Crack senkt Säure und betont Süße und Körper."}, {"cat": "Wasser", "q": "Welche Gesamthärte (Calcium) gibt die SCA als Zielwert an (ppm CaCO3)?", "ans": "ca. 68 ppm (±15)", "fb": "Der Zielwert liegt bei etwa <b>68 ppm</b>."}, {"cat": "Wasser", "q": "Welche Alkalinität empfiehlt die SCA als Zielwert (ppm CaCO3)?", "ans": "ca. 40 ppm (±10)", "fb": "Die Ziel-Alkalinität liegt bei etwa <b>40 ppm</b>."}, {"cat": "Wasser", "q": "Welcher pH-Wert gilt für Brühwasser als ideal (neutral)?", "ans": "ca. 7 pH (±0.5)", "fb": "Neutraler pH <b>7</b> ist ideal."}, {"cat": "Wasser", "q": "Welche grobe Spanne nennt die SCA für akzeptable Gesamthärte?", "ans": "ca. 50-175 ppm", "fb": "Akzeptable Gesamthärte liegt grob bei <b>50-175 ppm</b> (Ziel ~68 ppm)."}, {"cat": "Wasser", "q": "Welche Rolle spielt Alkalinität (Bikarbonat) beim Brühen?", "ans": "Sie puffert Säuren und beeinflusst die wahrgenommene Säure", "fb": "<b>Alkalinität</b> puffert Säuren; zu viel macht den Kaffee flach."}, {"cat": "Wasser", "q": "Komplett entmineralisiertes Wasser (0 ppm) extrahiert Kaffee meist schlechter.", "ans": "Wahr", "fb": "Mineralien (v. a. Magnesium / Calcium) fördern die <b>Extraktion</b>; reines Wasser unterextrahiert oft."}, {"cat": "Wasser", "q": "Mineralien wie Magnesium und Calcium beeinflussen die ___ des Kaffees positiv.", "ans": "Extraktion", "fb": "Sie binden Aromastoffe und verbessern die <b>Extraktion</b>."}, {"cat": "Wasser", "q": "Welcher Wert gehört NICHT zum SCA-Wasserstandard?", "ans": "Mahlgrad", "fb": "<b>Mahlgrad</b> ist kein Wasserparameter."}, {"cat": "Wasser", "q": "Welcher pH-Wert gilt als neutral und ideal für Brühwasser?", "ans": "pH 7", "fb": "<b>pH 7</b> ist neutral und der Zielwert."}, {"cat": "Wasser", "q": "Sehr hohe Alkalinität kann Kaffee flach und stumpf schmecken lassen.", "ans": "Wahr", "fb": "Zu hohe Pufferung dämpft die wahrnehmbare <b>Säure</b>."}, {"cat": "Anbau & Verarbeitung", "q": "Welche Art enthält im Schnitt deutlich mehr Koffein?", "ans": "Robusta", "fb": "<b>Robusta</b> hat im Schnitt etwa doppelt so viel Koffein wie Arabica."}, {"cat": "Anbau & Verarbeitung", "q": "Arabica gilt geschmacklich meist als feiner / säurebetonter als Robusta.", "ans": "Wahr", "fb": "<b>Arabica</b> ist meist komplexer und säurebetonter; Robusta erdiger / bitterer."}, {"cat": "Anbau & Verarbeitung", "q": "Ordne Aufbereitung und Kurzbeschreibung zu.", "ans": "Washed ↔ Fruchtfleisch entfernt, fermentiert / gewaschen, klar; Natural ↔ ganze Kirsche getrocknet, fruchtig; Honey ↔ teilweise Fruchtfleisch belassen, süß / rund", "fb": "Die Aufbereitung prägt das Tassenprofil deutlich."}, {"cat": "Anbau & Verarbeitung", "q": "Wofür steht die Abkürzung SHB bei Kaffee?", "ans": "Super Hard Bean (Hochlandkaffee)", "fb": "<b>SHB</b> = Strictly / Super Hard Bean, Kaffee aus großer Höhe mit dichter Bohne."}, {"cat": "Anbau & Verarbeitung", "q": "Welche der folgenden sind Arabica-Varietäten?", "ans": "Bourbon, Typica, Geisha", "fb": "<b>Bourbon, Typica, Geisha</b> sind Arabica-Varietäten; Robusta / Canephora sind eine eigene Art."}, {"cat": "Anbau & Verarbeitung", "q": "Ordne den Aufbau der Kaffeekirsche von außen nach innen.", "ans": "Haut (Exokarp) → Fruchtfleisch (Mesokarp) → Pergamenthaut (Endokarp) → Silberhäutchen → Bohne (Samen)", "fb": "Von der Haut bis zum Samen im Inneren."}, {"cat": "Anbau & Verarbeitung", "q": "Höhenlage kann die Bohnendichte und Säure / Komplexität beeinflussen.", "ans": "Wahr", "fb": "Größere <b>Höhe</b> führt oft zu dichteren Bohnen mit komplexerer Säure."}, {"cat": "Anbau & Verarbeitung", "q": "Bei der ___-Aufbereitung wird die ganze Kirsche samt Fruchtfleisch getrocknet.", "ans": "Natural", "fb": "<b>Natural</b> liefert oft fruchtige, intensive Profile."}, {"cat": "Anbau & Verarbeitung", "q": "Welche ist KEINE Aufbereitungsmethode?", "ans": "Bourbon", "fb": "<b>Bourbon</b> ist eine Varietät, keine Aufbereitung."}, {"cat": "Anbau & Verarbeitung", "q": "Welche Varietät ist für florale, teeartige Profile besonders bekannt?", "ans": "Geisha", "fb": "<b>Geisha</b> (Gesha) ist für florale, jasminartige Noten berühmt."}, {"cat": "Anbau & Verarbeitung", "q": "Welche Aufbereitung gilt als am 'saubersten' / klarsten im Tassenprofil?", "ans": "Washed", "fb": "<b>Washed</b> liefert meist das klarste, sauberste Profil."}, {"cat": "Anbau & Verarbeitung", "q": "Robusta wird oft in niedrigeren Höhen angebaut als hochwertiger Arabica.", "ans": "Wahr", "fb": "<b>Robusta</b> ist robuster und wächst gut in niedrigeren, wärmeren Lagen."}, {"cat": "Anbau & Verarbeitung", "q": "Welche Aussagen über Arabica vs. Robusta stimmen?", "ans": "Robusta hat mehr Koffein, Arabica wächst oft höher, Robusta ist meist bitterer / erdiger, Robusta ist krankheitsresistenter", "fb": "Arabica: höher, feiner, weniger Koffein. Robusta: mehr Koffein, robuster, erdiger."}, {"cat": "Green Grading & Defekte", "q": "Welche Probengröße nutzt das SCA Green Grading (Gramm Rohkaffee)?", "ans": "ca. 350 g (±20)", "fb": "Die Standard-Probengröße ist <b>350 g</b> Rohkaffee."}, {"cat": "Green Grading & Defekte", "q": "Welche Restfeuchte gilt für Rohkaffee als üblicher Zielbereich (Mittelwert, %)?", "ans": "ca. 11 % (±1)", "fb": "Üblich sind etwa <b>10-12 %</b> Restfeuchte."}, {"cat": "Green Grading & Defekte", "q": "Wie viele primäre Defekte darf Specialty-Rohkaffee enthalten?", "ans": "0", "fb": "Specialty erlaubt <b>0 primäre Defekte</b> in der Probe."}, {"cat": "Green Grading & Defekte", "q": "Wie viele 'Full Defects' sind für Specialty maximal erlaubt?", "ans": "höchstens 5", "fb": "Specialty erlaubt <b>maximal 5 Full Defects</b> und 0 primäre Defekte."}, {"cat": "Green Grading & Defekte", "q": "Im Green Grading unterscheidet man primäre und sekundäre Defekte.", "ans": "Wahr", "fb": "<b>Primäre</b> Defekte wiegen schwerer als <b>sekundäre</b> Defekte."}, {"cat": "Green Grading & Defekte", "q": "Ordne Defekt und Kategorie zu.", "ans": "Voll schwarze Bohne ↔ primärer Defekt; Voll saure Bohne ↔ primärer Defekt; Bruchstück / Broken ↔ sekundärer Defekt; Verfärbte (faded) Bohne ↔ sekundärer Defekt", "fb": "Schwarze und saure Bohnen zählen als primär, Bruch und Verfärbung eher sekundär."}, {"cat": "Green Grading & Defekte", "q": "Welcher Begriff gehört NICHT zum Green Grading?", "ans": "Crust break", "fb": "<b>Crust break</b> gehört zum Cupping."}, {"cat": "Green Grading & Defekte", "q": "Rohkaffee wird vor der Defektbewertung auf die richtige ___ geprüft (meist ~10-12 %).", "ans": "Feuchte", "fb": "Die <b>Restfeuchte</b> sollte für Lagerstabilität etwa 10-12 % betragen."}, {"cat": "Green Grading & Defekte", "q": "Specialty-Kaffee darf keine primären Defekte enthalten.", "ans": "Wahr", "fb": "<b>0 primäre Defekte</b> sind Voraussetzung für Specialty."}, {"cat": "Green Grading & Defekte", "q": "Wie viele 'Full Defects' sind für Specialty maximal zulässig (Zahl)?", "ans": "ca. 5 Defekte", "fb": "Maximal <b>5 Full Defects</b> sind erlaubt."}, {"cat": "Standards & Geschichte", "q": "In welchem Jahr fusionierten SCAA und SCAE zur SCA?", "ans": "ca. 2017 Jahr", "fb": "Die SCA entstand <b>2017</b> aus der Fusion."}, {"cat": "Standards & Geschichte", "q": "Woraus entstand die SCA?", "ans": "SCAA + SCAE", "fb": "Die <b>SCA</b> entstand 2017 aus der Fusion von SCAA und SCAE."}, {"cat": "Standards & Geschichte", "q": "Was ist ein 'Q-Grader'?", "ans": "Ein zertifizierter Kaffee-Sensoriker / Verkoster", "fb": "Ein <b>Q-Grader</b> ist ein lizenzierter Verkoster, der Kaffeequalität nach Protokoll bewertet."}, {"cat": "Standards & Geschichte", "q": "Ordne die 'Drei Wellen des Kaffees' chronologisch.", "ans": "Erste Welle (Massenkaffee / Verbreitung) → Zweite Welle (Coffee-Shops / Espresso-Kultur) → Dritte Welle (Specialty / Herkunft &amp; Handwerk)", "fb": "Von Massenkaffee über Cafe-Kultur zu Specialty."}, {"cat": "Standards & Geschichte", "q": "Das geografische Anbaugürtel-Band rund um den Äquator heißt ___ (englisch).", "ans": "Coffee Belt", "fb": "Der <b>Coffee Belt</b> (Bean Belt) liegt grob zwischen den Wendekreisen."}, {"cat": "Standards & Geschichte", "q": "Die 'Dritte Welle' betont Herkunft, Transparenz und handwerkliche Zubereitung.", "ans": "Wahr", "fb": "Die <b>Dritte Welle</b> behandelt Kaffee ähnlich wie Wein: Herkunft und Handwerk im Fokus."}, {"cat": "Standards & Geschichte", "q": "Welche Aufgabe hat die SCA u. a.?", "ans": "Standards, Bildung und Zertifizierungen rund um Specialty Coffee", "fb": "Die <b>SCA</b> entwickelt Standards, Bildungsprogramme und Zertifizierungen."}, {"cat": "Standards & Geschichte", "q": "Welcher Begriff gehört NICHT zur SCA-Organisation?", "ans": "Maillard-Reaktion", "fb": "Die <b>Maillard-Reaktion</b> ist Chemie der Röstung - kein SCA-Organisationsbegriff."}, {"cat": "Standards & Geschichte", "q": "Wofür steht die Abkürzung SCA?", "ans": "Specialty Coffee Association", "fb": "<b>SCA</b> = Specialty Coffee Association."}, {"cat": "Aromarad & Sensorik", "q": "In welchem Jahr wurde das überarbeitete SCA/WCR Coffee Taster's Flavor Wheel veröffentlicht?", "ans": "ca. 2016 Jahr", "fb": "Das überarbeitete Flavor Wheel erschien <b>2016</b>."}, {"cat": "Aromarad & Sensorik", "q": "Mit welcher Organisation wurde das Aromarad 2016 überarbeitet?", "ans": "World Coffee Research (WCR)", "fb": "Das überarbeitete <b>Flavor Wheel</b> entstand 2016 mit der World Coffee Research."}, {"cat": "Aromarad & Sensorik", "q": "Aus welchem Jahr stammt das ursprüngliche (erste) SCAA-Aromarad?", "ans": "ca. 1995 Jahr", "fb": "Das ursprüngliche Aromarad stammt von <b>1995</b>."}, {"cat": "Aromarad & Sensorik", "q": "Wie liest man das Aromarad typischerweise?", "ans": "Von innen nach außen, vom Allgemeinen zum Spezifischen", "fb": "Von <b>innen (allgemein) nach außen (spezifisch)</b>, z. B. Frucht zu Beere zu Erdbeere."}, {"cat": "Aromarad & Sensorik", "q": "Ordne Aromakategorie und Beispiel zu.", "ans": "Fruchtig ↔ Beere / Zitrus; Floral ↔ Jasmin / Rose; Nussig / Kakao ↔ Mandel / Schokolade; Würzig ↔ Zimt / Nelke", "fb": "Die Hauptkategorien fassen verwandte Aromen zusammen."}, {"cat": "Aromarad & Sensorik", "q": "Welches ist ein typisches FEHLAROMA (Off-Flavor)?", "ans": "Erdig / muffig", "fb": "<b>Erdig / muffig</b> gilt als Fehlaroma; die anderen sind erwünschte Noten."}, {"cat": "Aromarad & Sensorik", "q": "Welche der folgenden gelten als Fehlaromen?", "ans": "Gummiartig, Fermentiert (überfermentiert), Erdig, Baker / papierig", "fb": "<b>Gummiartig, überfermentiert, erdig, papierig</b> sind Fehlaromen; blumig ist erwünscht."}, {"cat": "Aromarad & Sensorik", "q": "Das offizielle SCA-Werkzeug zur Beschreibung von Kaffeearomen heißt Coffee Taster's ___ Wheel.", "ans": "Flavor", "fb": "Das <b>Coffee Taster's Flavor Wheel</b> ordnet Aromen hierarchisch."}, {"cat": "Aromarad & Sensorik", "q": "Das innere Zentrum des Aromarads enthält die allgemeinsten Kategorien.", "ans": "Wahr", "fb": "Innen stehen die <b>allgemeinen</b> Kategorien, außen die spezifischen Aromen."}, {"cat": "Aromarad & Sensorik", "q": "Welche Beschreibung gehört am ehesten zu 'Säure' (Acidity) positiv?", "ans": "lebendig, zitrusartig, hell", "fb": "Positive <b>Säure</b> wird als lebendig, hell, zitrus- oder apfelartig beschrieben."}, {"cat": "Aromarad & Sensorik", "q": "Wie beschreibt man 'Body' (Körper) sinnvoll?", "ans": "leicht / teeartig bis schwer / sirupartig", "fb": "<b>Body</b> beschreibt das Mundgefühl: von leicht / teeartig bis schwer / sirupartig."}, {"cat": "Aromarad & Sensorik", "q": "Ordne Fehlaroma und mögliche Ursache zu.", "ans": "Fermentiert / weinig-überreif ↔ überlange / falsche Fermentation; Erdig / muffig ↔ schlechte Trocknung / Lagerung; Gummiartig ↔ oft Robusta / Verarbeitungsfehler; Baker / papierig ↔ alter / überlagerter Kaffee", "fb": "Fehlaromen lassen oft auf konkrete Prozessfehler schließen."}, {"cat": "Aromarad & Sensorik", "q": "Welcher Begriff beschreibt KEINE Süße- oder Frucht-Note?", "ans": "Aschig", "fb": "<b>Aschig</b> ist eine Röst- oder Fehlnote, keine Süße / Frucht."}, {"cat": "Aromarad & Sensorik", "q": "Welche Kategorie passt zu 'Zitrone, Apfel, Beere'?", "ans": "Fruchtig", "fb": "Diese gehören zur Kategorie <b>Fruchtig</b>."}, {"cat": "Aromarad & Sensorik", "q": "Welcher Begriff gehört NICHT in die Kategorie 'Geröstet'?", "ans": "Jasmin", "fb": "<b>Jasmin</b> ist floral, nicht geröstet."}, {"cat": "Aromarad & Sensorik", "q": "Eine überfermentierte, weinig-faulige Note bezeichnet man als ___ Fehlaroma.", "ans": "fermentiert", "fb": "<b>Fermentiert</b> (überfermentiert) entsteht durch falsche oder zu lange Fermentation."}, {"cat": "Aromarad & Sensorik", "q": "Das Aromarad wurde gemeinsam mit einem Sensorik-Lexikon (WCR Sensory Lexicon) wissenschaftlich fundiert.", "ans": "Wahr", "fb": "Die Überarbeitung 2016 stützte sich auf das <b>WCR Sensory Lexicon</b>."}, {"cat": "Aromarad & Sensorik", "q": "Welche Note ist eine typische ERWUENSCHTE Süße-Beschreibung?", "ans": "Karamell", "fb": "<b>Karamell</b> ist eine erwünschte Süße- / Zucker-Note."}, {"cat": "Aromarad & Sensorik", "q": "Welche Kategorien sind tatsächlich Hauptkategorien des Flavor Wheels?", "ans": "Fruity, Floral, Roasted, Sour / Fermented, Spices", "fb": "Hauptkategorien sind u. a. Fruity, Floral, Roasted, Sour/Fermented, Spices - nicht 'Maschinenmarke'."}, {"cat": "Aromarad & Sensorik", "q": "Ordne vom allgemeinen zum spezifischen Begriff im Aromarad.", "ans": "Fruchtig → Beere → Erdbeere", "fb": "Innen allgemein (Fruchtig), außen spezifisch (Erdbeere)."}, {"cat": "Aromarad & Sensorik", "q": "Welche Note deutet eher auf einen Verarbeitungsfehler hin?", "ans": "Gummiartig", "fb": "<b>Gummiartig</b> deutet oft auf verarbeitungs- oder Robusta-bedingte Fehlnoten hin."}, {"cat": "Aromarad & Sensorik", "q": "Das Coffee Taster's Flavor Wheel hilft, Aromen einheitlich zu benennen.", "ans": "Wahr", "fb": "Es schafft eine <b>gemeinsame Sprache</b> für die Sensorik."}, {"cat": "Aromarad & Sensorik", "q": "Welche Beschreibung passt NICHT zu 'Körper' (Body)?", "ans": "zitrusartig", "fb": "<b>Zitrusartig</b> beschreibt Säure, nicht den Körper."}, {"cat": "Espresso-Grundlagen", "q": "Welche Einwaage und Output passen zu einer 1:2-Ratio?", "ans": "18 g -&gt; 36 g", "fb": "18 g zu 36 g entspricht genau <b>1:2</b>."}, {"cat": "Espresso-Grundlagen", "q": "Welche Änderung senkt bei sonst gleichen Parametern die Extraktion am direktesten?", "ans": "Gröberer Mahlgrad", "fb": "Ein <b>gröberer Mahlgrad</b> reduziert Oberfläche und Widerstand und damit die Extraktion."}, {"cat": "Milch & Latte Art", "q": "Welcher Fehler führt typischerweise zu einem 'lauten Kreischen' beim Milchschäumen?", "ans": "Lanze zu weit an der Oberfläche / zu viel Luft", "fb": "Steht die Lanze zu hoch, wird zu viel Luft gezogen - es kreischt und der Schaum wird grob."}, {"cat": "Milch & Latte Art", "q": "Warum eignet sich Vollmilch oft gut für stabilen Mikroschaum?", "ans": "Wegen Proteinen und Fett, die den Schaum stabilisieren", "fb": "<b>Proteine</b> stabilisieren die Blasen, <b>Fett</b> sorgt für cremige Textur."}, {"cat": "Mahlen & Dosieren", "q": "Was bewirkt ein feinerer Mahlgrad bei sonst gleichen Parametern?", "ans": "Langsamerer Durchlauf, mehr Extraktion", "fb": "Feiner = mehr Widerstand = <b>langsamer</b> und meist mehr Extraktion."}, {"cat": "Mahlen & Dosieren", "q": "Welches Phänomen reduziert WDT primär?", "ans": "Klumpen und ungleiche Verteilung", "fb": "<b>WDT</b> löst Klumpen auf und sorgt für gleichmäßige Verteilung gegen Channeling."}, {"cat": "Maschine & Wartung", "q": "Welches Hilfsmittel braucht man für chemisches Backflushing?", "ans": "Blindsieb plus Reinigungspulver", "fb": "Chemisches Backflushing nutzt <b>Blindsieb und Reinigungspulver</b>."}, {"cat": "Maschine & Wartung", "q": "Was ist der 'Shower Screen' (Dusche)?", "ans": "Das Sieb, das Wasser über den Puck verteilt", "fb": "Der <b>Shower Screen</b> verteilt das Brühwasser gleichmäßig über den Puck."}, {"cat": "Brühmethoden", "q": "Welche Methode liefert in der Regel den vollmundigsten, öligsten Body?", "ans": "French Press", "fb": "Die <b>French Press</b> lässt Öle und feine Partikel durch und wirkt vollmundig."}, {"cat": "Brühmethoden", "q": "Welche Anpassung hilft, wenn ein Pour-over zu schnell durchläuft und dünn schmeckt?", "ans": "Feiner mahlen", "fb": "Zu schnell und dünn = unterextrahiert, also <b>feiner mahlen</b>."}, {"cat": "Troubleshooting", "q": "Welche Ursache passt zu 'Espresso spritzt / blubbert aus dem Siebträger'?", "ans": "Channeling / schlechte Verteilung", "fb": "Spritzen deutet oft auf <b>Channeling</b> durch ungleiche Verteilung hin."}, {"cat": "Troubleshooting", "q": "Welche schnelle Korrektur passt zu einem zu schnell laufenden, sauren Shot?", "ans": "Feiner mahlen", "fb": "Feiner mahlen erhöht Widerstand und Extraktion - gegen Säure."}, {"cat": "Extraktion & Kennzahlen", "q": "Welcher Bereich beschreibt 'ideale Stärke' (TDS) für Filterkaffee?", "ans": "1,15-1,35 %", "fb": "Der ideale TDS-Bereich liegt bei <b>1,15-1,35 %</b>."}, {"cat": "Extraktion & Kennzahlen", "q": "Du willst die Stärke (TDS) erhöhen, ohne die Extraktion stark zu ändern. Was tust du?", "ans": "Engere Brew Ratio (mehr Kaffee pro Wasser)", "fb": "Eine <b>engere Ratio</b> (mehr Kaffee) erhöht die Konzentration / TDS."}, {"cat": "Cupping & Sensorik", "q": "Welches Attribut bewertet die Gleichmäßigkeit über mehrere Tassen einer Probe?", "ans": "Uniformity", "fb": "<b>Uniformity</b> prüft, ob alle Tassen gleich schmecken."}, {"cat": "Cupping & Sensorik", "q": "Wofür steht das Attribut 'Clean Cup'?", "ans": "Abwesenheit von negativen Fehlnoten", "fb": "<b>Clean Cup</b> bewertet die Abwesenheit störender Off-Flavors, nicht die Tassen-Hygiene."}, {"cat": "Röstung", "q": "Was bedeutet eine niedrige Agtron-Zahl?", "ans": "Dunkler geröstet", "fb": "Niedrige Agtron-Zahl = <b>dunkler</b> geröstet; hohe Zahl = heller."}, {"cat": "Röstung", "q": "Welche Aromen betont eine helle Röstung tendenziell?", "ans": "Säure und Frucht", "fb": "Helle Röstungen betonen <b>Säure und Frucht</b>."}, {"cat": "Wasser", "q": "Welches Mineral trägt besonders zur Extraktionskraft des Wassers bei?", "ans": "Magnesium", "fb": "<b>Magnesium</b> bindet Aromastoffe gut und fördert die Extraktion."}, {"cat": "Anbau & Verarbeitung", "q": "Welche Aufbereitung liegt geschmacklich zwischen Washed und Natural?", "ans": "Honey", "fb": "Die <b>Honey</b>-Aufbereitung liegt zwischen klar (Washed) und fruchtig (Natural)."}, {"cat": "Anbau & Verarbeitung", "q": "Welcher Teil der Kaffeekirsche wird letztlich geröstet?", "ans": "Der Samen (Bohne)", "fb": "Geröstet wird der <b>Samen</b> (die Bohne) im Inneren der Kirsche."}, {"cat": "Green Grading & Defekte", "q": "Welche Bohne zählt als primärer Defekt?", "ans": "Voll schwarze Bohne", "fb": "Eine <b>voll schwarze Bohne</b> ist ein primärer (schwerer) Defekt."}, {"cat": "Standards & Geschichte", "q": "Wo verläuft der 'Coffee Belt' grob?", "ans": "Rund um den Äquator zwischen den Wendekreisen", "fb": "Der <b>Coffee Belt</b> liegt grob zwischen den Wendekreisen rund um den Äquator."}, {"cat": "Standards & Geschichte", "q": "Welche Welle entspricht am ehesten dem Aufstieg großer Kaffeehausketten?", "ans": "Zweite Welle", "fb": "Die <b>zweite Welle</b> brachte Espresso-Kultur und Cafe-Ketten."}, {"cat": "Aromarad & Sensorik", "q": "Welche Kategorie umfasst Noten wie Vanille, Karamell und Honig?", "ans": "Sweet (Süß)", "fb": "Vanille, Karamell und Honig fallen in die Kategorie <b>Sweet</b>."}, {"cat": "Aromarad & Sensorik", "q": "Welche Kategorie deckt 'erbsig / grasig / strohig' ab?", "ans": "Green / Vegetative", "fb": "<b>Green / Vegetative</b> umfasst grasige, erbsige und strohige Noten."}, {"cat": "Aromarad & Sensorik", "q": "Welche Note ist klar floral?", "ans": "Jasmin", "fb": "<b>Jasmin</b> ist eine typische florale Note."}, {"cat": "Espresso-Grundlagen", "q": "Welche Parameter beeinflussen die Espresso-Extraktion direkt?", "ans": "Mahlgrad, Dosis, Brühtemperatur, Brühzeit", "fb": "Mahlgrad, Dosis, Temperatur und Zeit zählen - die Tassenfarbe nicht."}, {"cat": "Milch & Latte Art", "q": "Was kennzeichnet guten Mikroschaum?", "ans": "Feinporig, Glänzend, Fließend / streichfähig", "fb": "Guter Mikroschaum ist feinporig, glänzend und fließend."}, {"cat": "Mahlen & Dosieren", "q": "Welche Maßnahmen reduzieren Channeling?", "ans": "WDT, Gleichmäßiges Tampern, Leveling vor dem Tampern", "fb": "WDT, ebenes Tampern und Leveling helfen; schräges Tampern und Klumpen schaden."}, {"cat": "Maschine & Wartung", "q": "Welche Aufgaben gehören zur regelmäßigen Wartung?", "ans": "Backflushing, Entkalken, Dichtungen tauschen, Shower Screen reinigen", "fb": "Backflushing, Entkalken, Dichtungen und Reinigung gehören dazu - Anbau nicht."}, {"cat": "Brühmethoden", "q": "Welche Methoden sind Vollimmersion?", "ans": "French Press, Cold Brew, AeroPress (Immersionsteil)", "fb": "French Press, Cold Brew und der Immersionsteil der AeroPress sind Vollimmersion."}, {"cat": "Troubleshooting", "q": "Welche Anzeichen sprechen für Überextraktion?", "ans": "Bitter, Adstringierend / trocken, Aschig", "fb": "Bitter, adstringierend und aschig deuten auf Überextraktion; sauer/dünn auf Unterextraktion."}, {"cat": "Espresso-Grundlagen", "q": "Welche Maßnahmen können die Brühzeit eines zu schnellen Shots verlängern?", "ans": "Feiner mahlen, Dosis erhöhen, Besser verteilen / tampern", "fb": "Feiner mahlen, mehr Dosis und bessere Prep erhöhen den Widerstand."}, {"cat": "Cupping & Sensorik", "q": "Welche Attribute gehören zum klassischen SCA-Bewertungsbogen?", "ans": "Fragrance/Aroma, Flavor, Acidity, Body, Balance", "fb": "Alle außer 'Maschinenmarke' sind echte Cupping-Attribute."}, {"cat": "Röstung", "q": "Welche Aussagen zur Röstung stimmen?", "ans": "First Crack vor Second Crack, Maillard erzeugt Bräunung, Helle Röstung = mehr Säure, Development Time prägt das Profil", "fb": "Dunkle Röstung hat WENIGER Säure - die anderen Aussagen stimmen."}, {"cat": "Wasser", "q": "Welche Parameter nennt der SCA-Wasserstandard?", "ans": "Gesamthärte, Alkalinität, pH, TDS", "fb": "Härte, Alkalinität, pH und TDS gehören dazu - Mahlgrad nicht."}, {"cat": "Anbau & Verarbeitung", "q": "Welche sind gängige Aufbereitungsmethoden?", "ans": "Washed, Natural, Honey, Wet-Hulled", "fb": "Washed, Natural, Honey und Wet-Hulled sind Aufbereitungen; Bourbon ist eine Varietät."}, {"cat": "Green Grading & Defekte", "q": "Was gehört zu den Specialty-Kriterien im Green Grading?", "ans": "0 primäre Defekte, max. 5 Full Defects, 350 g Probe, Feuchte ~10-12 %", "fb": "0 primäre Defekte, max. 5 Full Defects, 350 g Probe und passende Feuchte - nicht beliebig."}, {"cat": "Standards & Geschichte", "q": "Welche Aussagen zur SCA stimmen?", "ans": "Entstand 2017, Fusion aus SCAA und SCAE, Vergibt Q-Grader-Zertifizierung, Entwickelt Standards", "fb": "Die SCA baut keinen Kaffee an - die übrigen Aussagen stimmen."}, {"cat": "Extraktion & Kennzahlen", "q": "Welche Aussagen zum Golden Cup stimmen?", "ans": "Extraktion 18-22 %, TDS ca. 1,15-1,35 %, Beschreibt Stärke und Extraktion, Ist ein Zielfenster", "fb": "Der Golden Cup bezieht sich primär auf Filterkaffee, nicht nur auf Espresso."}, {"cat": "Aromarad & Sensorik", "q": "Welche gehören zu den Hauptkategorien des Flavor Wheels?", "ans": "Fruity, Sweet, Floral, Spices, Roasted", "fb": "Maschinentyp ist keine Aromakategorie - die übrigen sind Hauptkategorien."}, {"cat": "Aromarad & Sensorik", "q": "Welche Begriffe sind klassische Fehlaromen?", "ans": "Erdig, Fermentiert, Gummiartig, Phenolisch / medizinisch", "fb": "Erdig, fermentiert, gummiartig und phenolisch sind Fehlaromen; Schokolade ist erwünscht."}, {"cat": "Aromarad & Sensorik", "q": "Welche Noten gehören zur Kategorie 'Fruchtig'?", "ans": "Beere, Zitrus, Steinobst, Apfel", "fb": "Beere, Zitrus, Steinobst und Apfel sind fruchtig; Jasmin ist floral."}, {"cat": "Espresso-Grundlagen", "q": "Der Standard-Brühdruck für Espresso beträgt ___ bar.", "ans": "9", "fb": "<b>9 bar</b> sind der klassische Brühdruck."}, {"cat": "Milch & Latte Art", "q": "Der feinporige Schaum für Latte Art heißt ___.", "ans": "Mikroschaum", "fb": "<b>Mikroschaum</b> ist die Grundlage guter Latte Art."}, {"cat": "Maschine & Wartung", "q": "Reinigen der Brühgruppe mit Druck und Blindsieb nennt man ___ (englisch).", "ans": "Backflushing", "fb": "<b>Backflushing</b> entfernt Kaffeefett aus der Gruppe."}, {"cat": "Brühmethoden", "q": "Das Vorbenetzen des Kaffees vor dem eigentlichen Aufguss heißt ___ (englisch).", "ans": "Blooming", "fb": "<b>Blooming</b> lässt CO2 entweichen für gleichmäßige Extraktion."}, {"cat": "Extraktion & Kennzahlen", "q": "Die ___ misst die Stoffmenge, die ins Getränk übergeht (englisch: Extraction Yield).", "ans": "Extraktionsausbeute", "fb": "Die <b>Extraktionsausbeute</b> sollte etwa 18-22 % betragen."}, {"cat": "Cupping & Sensorik", "q": "Die klassische Cupping-Einwaage beträgt ___ Gramm pro 150 ml Wasser.", "ans": "8,25", "fb": "<b>8,25 g / 150 ml</b> entsprechen etwa 1:18,18."}, {"cat": "Röstung", "q": "Der erste hörbare Crack beim Rösten heißt ___ (englisch).", "ans": "First Crack", "fb": "Der <b>First Crack</b> liegt bei etwa 196 Grad C."}, {"cat": "Standards & Geschichte", "q": "Ein zertifizierter Profi-Verkoster nach SCA-System heißt ___ .", "ans": "Q-Grader", "fb": "Ein <b>Q-Grader</b> bewertet Kaffee standardisiert."}, {"cat": "Espresso-Grundlagen", "q": "Ordne Begriff und Beschreibung zu.", "ans": "Crema ↔ Schaumschicht aus Ölen und CO2; Puck ↔ verdichtetes Kaffeemehl im Sieb; Tamper ↔ Werkzeug zum Verdichten; Channeling ↔ Wasser fließt durch Kanäle", "fb": "Grundbegriffe der Espresso-Zubereitung."}, {"cat": "Milch & Latte Art", "q": "Ordne Latte-Art-Motiv und Schwierigkeit zu.", "ans": "Herz ↔ Einsteiger; Tulpe ↔ mittel; Rosetta ↔ fortgeschritten; Schwan ↔ Profi", "fb": "Vom einfachen Herz bis zum komplexen Schwan."}, {"cat": "Mahlen & Dosieren", "q": "Ordne Symptom und Mahlgrad-Korrektur zu.", "ans": "Shot zu schnell, sauer ↔ feiner mahlen; Shot zu langsam, bitter ↔ gröber mahlen; Statische Aufladung ↔ RDT anwenden; Klumpen im Mehl ↔ WDT anwenden", "fb": "Mahlgrad und Verteilung gezielt anpassen."}, {"cat": "Brühmethoden", "q": "Ordne Methode und Merkmal zu.", "ans": "French Press ↔ Vollimmersion, voller Body; V60 ↔ Pour-over, klare Tasse; AeroPress ↔ Kolbendruck, schnell; Cold Brew ↔ kalt, lange Kontaktzeit", "fb": "Jede Methode hat ein charakteristisches Profil."}, {"cat": "Maschine & Wartung", "q": "Ordne Reinigung und Zweck zu.", "ans": "Backflushing ↔ Kaffeefett aus Brühgruppe; Entkalken ↔ Kalk aus Boiler / Leitungen; Milchsystemreiniger ↔ Milchreste aus Lanze / Schlauch; Filtertausch ↔ Wasserqualität erhalten", "fb": "Verschiedene Reinigungen für verschiedene Ablagerungen."}, {"cat": "Extraktion & Kennzahlen", "q": "Ordne Kennzahl und Bedeutung zu.", "ans": "TDS ↔ Stärke / Konzentration; Extraktionsausbeute ↔ gelöster Anteil des Kaffees; Brew Ratio ↔ Kaffee zu Wasser; Golden Cup ↔ ideales Zielfenster", "fb": "Die zentralen Brüh-Kennzahlen."}, {"cat": "Cupping & Sensorik", "q": "Ordne Cupping-Begriff und Zeitpunkt / Aktion zu.", "ans": "Fragrance ↔ trockener Duft vor dem Aufguss; Aroma ↔ Geruch nach dem Aufguss; Crust break ↔ Kruste nach ~4 min brechen; Schlürfen ↔ Bewertung am Gaumen", "fb": "Der Cupping-Ablauf in Stichworten."}, {"cat": "Röstung", "q": "Ordne Röst-Ereignis und Temperatur zu.", "ans": "First Crack ↔ ca. 196 Grad C; Second Crack ↔ ca. 224 Grad C; Trocknungsphase ↔ Start, Wasser entweicht; Maillard-Phase ↔ Bräunung beginnt", "fb": "Röstphasen und ihre groben Temperaturen."}, {"cat": "Wasser", "q": "Ordne Wasserparameter und SCA-Zielwert zu.", "ans": "Gesamthärte ↔ ca. 68 ppm; Alkalinität ↔ ca. 40 ppm; pH ↔ ca. 7; TDS ↔ Zielbereich definiert", "fb": "Die SCA-Wasserzielwerte im Überblick."}, {"cat": "Anbau & Verarbeitung", "q": "Ordne Begriff und Beschreibung zu.", "ans": "Arabica ↔ feiner, weniger Koffein, höhere Lagen; Robusta ↔ mehr Koffein, robuster, erdiger; SHB ↔ Hochland, dichte Bohne; Geisha ↔ floral, teeartig", "fb": "Arten, Lagen und Varietäten unterscheiden."}, {"cat": "Green Grading & Defekte", "q": "Ordne Begriff und Wert zu.", "ans": "Probengröße ↔ 350 g; Restfeuchte ↔ ~10-12 %; Primäre Defekte (Specialty) ↔ 0; Full Defects (Specialty) ↔ max. 5", "fb": "Die wichtigsten Green-Grading-Kennzahlen."}, {"cat": "Aromarad & Sensorik", "q": "Ordne Aromakategorie und Beispielnote zu.", "ans": "Sweet ↔ Karamell / Vanille; Nutty / Cocoa ↔ Mandel / Schokolade; Green / Vegetative ↔ Gras / Erbse; Sour / Fermented ↔ weinig / essigartig", "fb": "Weitere Hauptkategorien des Flavor Wheels."}, {"cat": "Milch & Latte Art", "q": "Ordne die Cappuccino-Zubereitung in sinnvolle Reihenfolge.", "ans": "Espresso beziehen → Milch aufschäumen → Schaum kurz absetzen lassen → Milch eingießen → Latte-Art-Motiv gießen", "fb": "Erst Espresso, dann Milch schäumen und eingießen."}, {"cat": "Maschine & Wartung", "q": "Ordne die Schritte beim chemischen Backflushing.", "ans": "Blindsieb einsetzen → Reinigungspulver dosieren → Mehrfach spülen lassen → Pulver entfernen → Mit klarem Wasser nachspülen", "fb": "Pulver, spülen, dann gründlich klar nachspülen."}, {"cat": "Röstung", "q": "Ordne nach steigender Temperatur.", "ans": "Trocknungsphase → First Crack (~196 Grad C) → Second Crack (~224 Grad C)", "fb": "Temperatur steigt im Röstverlauf an."}, {"cat": "Cupping & Sensorik", "q": "Ordne die Bewertung von der Heißtasse zur Kalttasse.", "ans": "Heiß: Fragrance/Aroma → Abkühlend: Flavor &amp; Acidity → Lauwarm: Body &amp; Balance → Kalt: Sweetness &amp; Overall", "fb": "Beim Abkühlen treten verschiedene Attribute hervor."}, {"cat": "Anbau & Verarbeitung", "q": "Ordne die Verarbeitung (washed) vom Pflücken zur Bohne.", "ans": "Kirschen pflücken → Entpulpen → Fermentieren → Waschen → Trocknen", "fb": "Typischer Ablauf der gewaschenen Aufbereitung."}, {"cat": "Aromarad & Sensorik", "q": "Ordne vom allgemeinen zum spezifischen Aroma.", "ans": "Floral → Blume → Jasmin", "fb": "Von der Hauptkategorie zur konkreten Note."}, {"cat": "Cupping & Sensorik", "q": "Im klassischen SCA-Cupping werden 8,25 g Kaffee auf 150 ml Wasser verwendet.", "ans": "Wahr", "fb": "Die Standard-Einwaage ist <b>8,25 g / 150 ml</b>."}, {"cat": "Röstung", "q": "Der Second Crack tritt bei niedrigerer Temperatur auf als der First Crack.", "ans": "Falsch", "fb": "Der Second Crack (~224 Grad C) liegt <b>höher</b> als der First Crack (~196 Grad C)."}], "sources": [["The World Atlas of Coffee – James Hoffmann", "Modernes Standardwerk zu Anbau, Röstung und Zubereitung."], ["Scott Rao – Fachbücher", "Tiefgehende Technik zu Espresso, Filter und Röstung."], ["Specialty Coffee Association", "sca.coffee – Standards, Cupping-Protokoll, Wassercharta."], ["Barista Hustle", "baristahustle.com – Extraktion, Milch und Technik, fundiert erklärt."], ["James Hoffmann (YouTube)", "Praxisnahe Videos zu Methoden, Maschinen und Sensorik."]], "articles": {"Espresso-Grundlagen": "<p><b>Espresso</b> ist eine konzentrierte Extraktion: Heißes Wasser wird mit hohem Druck durch fein gemahlenes, verdichtetes Kaffeemehl gepresst. Klassische Eckwerte sind eine <b>Ratio</b> von ca. <b>1:2</b> (z. B. 18 g Mehl ergeben ~36 g Getränk), ein Brühdruck von etwa <b>9 bar</b>, eine Wassertemperatur um <b>90–94 °C</b> und eine Extraktionszeit von rund <b>25–30 Sekunden</b>.</p>\n<p>Die <b>Crema</b> – die haselnussbraune Schaumschicht – entsteht aus emulgierten Ölen und CO2 frisch gerösteten Kaffees. Ein <b>Ristretto</b> wird kürzer/mit weniger Wasser gezogen (intensiver), ein <b>Lungo</b> länger. Sauberes <b>Tampern</b> (gleichmäßiges Verdichten) verhindert, dass Wasser ungleichmäßig durchläuft (<b>Channeling</b>).</p>", "Milch & Latte Art": "<p>Beim Aufschäumen wird Milch mit Dampf zu <b>Mikroschaum</b> – feinporig und glänzend. Entscheidend sind die <b>Ziehphase</b> (Luft einziehen) und die <b>Rollphase</b> (Wirbel, der den Schaum homogenisiert). Ideale Trinktemperatur liegt bei etwa <b>60–65 °C</b>; darüber wird die Milch „verbrannt\" und schmeckt nicht mehr süß.</p>\n<p>Getränke unterscheiden sich vor allem im Milch-Schaum-Verhältnis: <b>Cappuccino</b> etwa zu gleichen Teilen Espresso, Milch und Schaum; <b>Flat White</b> mit feinem Mikroschaum und mehr Espresso-Intensität; <b>Latte Macchiato</b> viel Milch, wenig Schaum, Espresso obenauf. <b>Latte Art</b> gelingt nur mit gut gerolltem Mikroschaum.</p>", "Mahlen & Dosieren": "<p>Der <b>Mahlgrad</b> ist die wichtigste Stellschraube am Espresso: zu fein → langsam, bitter (Überextraktion); zu grob → schnell, sauer (Unterextraktion). Man stellt ihn so ein, dass Dosis, Zeit und Ausbeute zusammenpassen. <b>Frisch mahlen</b> ist Pflicht, da Aromen schnell entweichen.</p>\n<p>Eine typische Doppel-Dosis (Doppio) liegt bei <b>18–20 g</b>. Für gleichmäßige Verteilung sorgen Techniken wie <b>WDT</b> (Auflockern mit Nadeln) und sauberes <b>Distribuieren</b> vor dem Tampern. <b>Scheibenmühlen</b> (flat/conical) mahlen gleichmäßiger als Schlagmahlwerke.</p>", "Maschine & Wartung": "<p>Espressomaschinen unterscheiden sich in der Temperaturstabilität: <b>Einkreiser</b>, <b>Zweikreiser</b> (HX) und <b>Dualboiler</b> (getrennte Kessel für Brühen und Dampf, am stabilsten). <b>PID</b>-Steuerungen halten die Temperatur präzise.</p>\n<p>Regelmäßige Pflege ist entscheidend: <b>Rückspülen</b> (Backflush) mit Blindsieb und Reiniger, Entfernen alter Kaffeeöle, sowie <b>Entkalken</b> je nach Wasserhärte. Eine gepflegte Maschine schmeckt sauberer und hält länger.</p>", "Brühmethoden": "<p>Neben Espresso gibt es zahlreiche <b>Filtermethoden</b>: <b>Pour Over</b> (V60, Chemex), <b>French Press</b> (Vollimmersion), <b>AeroPress</b> und <b>Filterkaffeemaschine</b>. Sie arbeiten ohne hohen Druck, mit gröberem Mahlgrad und längerer Kontaktzeit – das Ergebnis ist klarer und aromabetonter, weniger konzentriert.</p>\n<p>Bei Pour-Over-Methoden ist das <b>Blooming</b> typisch: kurzes Vorbenetzen, damit frischer Kaffee entgast (CO2 entweicht), bevor gleichmäßig aufgegossen wird. Filterpapier hält Öle zurück (klarere Tasse), Metallfilter lassen sie durch (vollmundiger).</p>", "Troubleshooting": "<p>Schmeckt der Espresso <b>sauer und dünn</b>, läuft er meist zu schnell durch → feiner mahlen oder Dosis erhöhen (Unterextraktion). Schmeckt er <b>bitter und adstringierend</b>, läuft er zu langsam → gröber mahlen (Überextraktion).</p>\n<p><b>Channeling</b> (Wasser bricht sich Bahn durch Risse im Puck) zeigt sich durch spritzende, ungleichmäßige Extraktion und entsteht durch ungleichmäßiges Verteilen oder Tampern. Konstanz bei Dosis, Verteilung und Mahlgrad ist der Schlüssel zur Fehlersuche – immer nur eine Variable ändern.</p>", "Extraktion & Kennzahlen": "<p>Zwei Kennzahlen beschreiben die Tasse objektiv: <b>TDS</b> (Total Dissolved Solids, der Anteil gelöster Feststoffe, gemessen per Refraktometer) und die daraus berechnete <b>Extraktionsausbeute</b> (Extraction Yield). Für Filterkaffee gilt ein „Goldener Standard\" von etwa <b>18–22 % Ausbeute</b>.</p>\n<p>Die <b>Brew Ratio</b> (Verhältnis Kaffee zu Wasser) steuert die Stärke, der <b>Mahlgrad</b> die Ausbeute. Wer reproduzierbar arbeiten will, wiegt Einwaage und Auslauf mit der Waage und misst die Zeit – Kaffee wird so vom Zufall zum Rezept.</p>", "Cupping & Sensorik": "<p><b>Cupping</b> ist das standardisierte Verkosten zur Qualitätsbewertung: gemahlener Kaffee wird mit heißem Wasser aufgegossen, die Kruste „gebrochen\" und gerochen, dann mit dem Löffel geschlürft. Bewertet werden u. a. <b>Aroma, Acidity (Säure), Body (Körper), Flavor, Aftertaste, Balance</b> und Sauberkeit.</p>\n<p>Die <b>SCA</b> nutzt ein 100-Punkte-Schema; ab 80 Punkten gilt Kaffee als <b>Specialty</b>. „Säure\" ist hier positiv gemeint – sie steht für lebendige, fruchtige Klarheit, nicht für Sauerkeit.</p>", "Röstung": "<p>Beim <b>Rösten</b> wandeln sich grüne Bohnen durch Hitze chemisch (u. a. <b>Maillard-Reaktion</b> und Karamellisierung). Hörbare Marken sind der <b>First Crack</b> (heller Röstgrad beginnt) und der <b>Second Crack</b> (dunkle Röstung). Helle Röstungen betonen Herkunft und Säure, dunkle Röstungen Röstaromen und Bitterkeit.</p>\n<p>Frisch gerösteter Kaffee gast CO2 aus; eine Ruhezeit von einigen Tagen (Degassing) verbessert die Extraktion. Kaffee ist ein Frischeprodukt – nach dem Öffnen rasch verbrauchen, kühl, trocken und luftdicht lagern.</p>", "Wasser": "<p>Kaffee besteht zu über 98 % aus <b>Wasser</b>, daher ist dessen Zusammensetzung entscheidend. Wichtig sind <b>Gesamthärte</b> (v. a. Magnesium/Calcium, fördert Extraktion) und <b>Karbonathärte/Alkalinität</b> (puffert Säure ab). Die <b>SCA</b> empfiehlt rund 50–175 ppm Gesamthärte bei moderater Alkalinität.</p>\n<p>Zu hartes/karbonatreiches Wasser verkalkt die Maschine und dämpft die Säure; zu weiches Wasser kann flach und sauer schmecken. Aufbereitung per Filter oder remineralisiertem Wasser verbessert Geschmack und schützt die Technik.</p>", "Anbau & Verarbeitung": "<p>Die zwei wichtigsten Arten sind <b>Arabica</b> (aromatischer, säurereicher, höhere Lagen) und <b>Robusta</b> (kräftiger, bitterer, mehr Koffein, robuster). Kaffee wächst im „Bohnengürtel\" rund um den Äquator; Höhenlage, Boden und Klima prägen den Charakter.</p>\n<p>Nach der Ernte wird die Kaffeekirsche <b>aufbereitet</b>: <b>gewaschen</b> (washed, klar und sauber), <b>natural</b> (an der Frucht getrocknet, fruchtig-intensiv) oder <b>honey/pulped natural</b> (dazwischen). Die Methode beeinflusst das Geschmacksprofil erheblich.</p>", "Green Grading & Defekte": "<p><b>Green Grading</b> ist die Bewertung des Rohkaffees (grüne Bohnen) vor der Röstung. Geprüft werden Größe (<b>Screen Size</b>), Feuchte, Dichte und vor allem <b>Defekte</b>. Man unterscheidet primäre Defekte (z. B. schwarze, saure Bohnen, Steine) und sekundäre (z. B. Bruch, Muschelbohnen).</p>\n<p>Für <b>Specialty-Kaffee</b> gelten strenge Grenzen (sehr wenige Defekte pro Probe). Fehler im Rohkaffee – etwa fermentierte oder schimmlige Bohnen – lassen sich durch Rösten nicht mehr ausgleichen.</p>", "Standards & Geschichte": "<p>Die <b>Specialty Coffee Association (SCA)</b> setzt internationale Standards für Cupping, Wasser und Röstung. Historisch verbreitete sich Kaffee von Äthiopien und der arabischen Halbinsel über Europa in die Welt; Espresso und die Siebträgermaschine prägten im 20. Jahrhundert Italien.</p>\n<p>Die „<b>Wellen</b>\" der Kaffeekultur beschreiben die Entwicklung: erste Welle (Massenware), zweite Welle (Coffeeshops, Espressokultur), dritte Welle (Kaffee als Genuss- und Herkunftsprodukt, Transparenz vom Anbau bis zur Tasse).</p>", "Aromarad & Sensorik": "<p>Das <b>Coffee Taster's Flavor Wheel</b> (SCA/World Coffee Research) ordnet Aromen von der groben Kategorie (z. B. fruchtig, nussig/kakaoig, blumig, würzig) bis zum feinen Einzelaroma. Es hilft, Eindrücke zu benennen und zu vergleichen – probiere den <b>Aromarad-Tab</b>.</p>\n<p>Beim Verkosten tastet man sich vom Allgemeinen zum Konkreten vor. Aromen entstehen aus Herkunft/Sorte, Aufbereitung, Röstung und Zubereitung – das Rad macht diese Vielfalt greifbar und schult das sensorische Gedächtnis.</p>"}};
document.documentElement.style.setProperty('--brand',APP.color);
const m=document.createElement('meta');m.name='theme-color';m.content=APP.color;document.head.appendChild(m);
document.title=APP.title+' – Nachschlagewerk';
document.getElementById('brand').innerHTML=APP.brand;
document.getElementById('logo').textContent=APP.ic;
document.getElementById('foot').textContent=APP.title+' · Nachschlagewerk · '+APP.entries.length+' Einträge';
// tabs
const tabsDef=[['look','Nachschlagen']];
if(APP.aroma)tabsDef.push(['aroma','Aromarad']);
tabsDef.push(['src','Quellen']);
const tabsEl=document.getElementById('tabs');
tabsDef.forEach((t,i)=>{const b=document.createElement('button');b.textContent=t[1];if(i===0)b.classList.add('active');
  b.onclick=()=>{document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));b.classList.add('active');
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('v-'+t[0]).classList.add('active');window.scrollTo({top:0});};
  tabsEl.appendChild(b);});
// chips
let activeCat='__all__';
const chipsEl=document.getElementById('chips');
function mkChip(label,val){const b=document.createElement('button');b.className='chip'+(val===activeCat?' active':'');b.textContent=label;
  b.onclick=()=>{activeCat=val;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));b.classList.add('active');render();};return b;}
chipsEl.appendChild(mkChip('Alle','__all__'));
APP.order.forEach(c=>{const ic=APP.icons[c]?APP.icons[c]+' ':'';chipsEl.appendChild(mkChip(ic+c,c));});
// render
const strip=s=>(s||'').replace(/<[^>]+>/g,'');
const searchEl=document.getElementById('search');
function render(){
  const q=searchEl.value.trim().toLowerCase();
  const cats=activeCat==='__all__'?APP.order:[activeCat];
  const list=document.getElementById('list');list.innerHTML='';
  let total=0;
  cats.forEach(cat=>{
    let items=APP.entries.filter(e=>e.cat===cat);
    if(q)items=items.filter(e=>(e.q+' '+strip(e.ans)+' '+strip(e.fb)).toLowerCase().includes(q));
    if(!items.length)return;
    total+=items.length;
    const block=document.createElement('div');block.className='catblock';
    const ic=APP.icons[cat]?'<span class="ic">'+APP.icons[cat]+'</span>':'';
    const art=(APP.articles&&APP.articles[cat])?'<div class="article">'+APP.articles[cat]+'</div>':'';
    block.innerHTML='<h2>'+ic+cat+'</h2>'+art+(items.length?'<div class="factlabel">Fakten &amp; Details</div>':'')+items.map(e=>{
      let s='<div class="entry"><div class="q">'+e.q+'</div>';
      if(e.ans)s+='<div class="ans"><span class="lab">Antwort:</span> '+e.ans+'</div>';
      if(e.fb)s+='<div class="fb">'+e.fb+'</div>';
      return s+'</div>';
    }).join('');
    list.appendChild(block);
  });
  document.getElementById('count').textContent=total+' Einträge'+(q?' für „'+searchEl.value+'"':'')+(activeCat!=='__all__'?' in '+activeCat:'');
  if(!total)list.innerHTML='<div class="empty">Nichts gefunden.</div>';
}
searchEl.addEventListener('input',render);
// sources
document.getElementById('srclist').innerHTML=APP.sources.map(s=>'<div class="src"><b>'+s[0]+'</b><p>'+s[1]+'</p></div>').join('');
render();
</script>
</body>
</html>
